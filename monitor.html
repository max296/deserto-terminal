<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MONITOR // PLATAFORMA O DESERTO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060c06; --panel:#0a140a; --border:#1a2e1a;
      --live:#7dff7d; --dim:#4a8a4a; --ink:#a0d8a0; --ink-dim:#5a885a;
      --danger:#ff4040; --warn:#ffb020;
      --font:'Courier New',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
    #app{display:flex;flex-direction:column;height:100%}

    #header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 16px;border-bottom:1px solid var(--border);
      font-size:11px;letter-spacing:.18em;flex-shrink:0;
    }
    #header .title{color:var(--dim)}
    #header .title b{color:var(--live)}
    #connDot{width:7px;height:7px;border-radius:50%;background:#ff4040;display:inline-block;margin-right:6px;animation:blink 1s step-end infinite}
    #connDot.on{background:var(--live);animation:none}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    #main{display:flex;flex:1;min-height:0;gap:0}

    /* === MAP === */
    #mapWrap{
      position:relative;display:flex;flex-direction:column;align-items:center;
      background:#030803;border-right:1px solid var(--border);
      padding:10px 6px;flex-shrink:0;
    }
    #mapLbl{font-size:9px;letter-spacing:.16em;color:var(--ink-dim);margin-bottom:6px}
    #mapCv{display:block;image-rendering:pixelated}
    #mapScale{
      font-size:8px;color:var(--ink-dim);margin-top:5px;letter-spacing:.06em;text-align:center;line-height:1.6
    }

    /* === SIDEBAR === */
    #sidebar{
      flex:1;min-width:220px;max-width:280px;display:flex;flex-direction:column;
      gap:0;overflow-y:auto;overflow-x:hidden;
    }
    .panel{
      border-bottom:1px solid var(--border);padding:12px 14px;flex-shrink:0;
    }
    .panel-lbl{font-size:9px;letter-spacing:.18em;color:var(--ink-dim);margin-bottom:9px}

    /* estado */
    #subStatus{
      font-size:18px;letter-spacing:.2em;font-weight:bold;padding:8px 0 4px;
      transition:color .3s;
    }
    #subStatus.intacto{color:var(--live)}
    #subStatus.danificado{color:var(--warn)}
    #subStatus.perigo{color:var(--danger);animation:pulse-danger .6s ease-in-out infinite alternate}
    @keyframes pulse-danger{from{opacity:1}to{opacity:.4}}
    #collisionBar{height:4px;background:var(--border);border-radius:2px;margin:7px 0 5px}
    #collisionFill{height:100%;border-radius:2px;background:var(--live);width:0%;transition:width .4s,background .4s}
    #collisionTxt{font-size:10px;color:var(--ink-dim);letter-spacing:.06em}

    /* telemetria */
    .tele-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
    .tele-k{font-size:9px;color:var(--ink-dim);letter-spacing:.14em;min-width:42px}
    .tele-v{font-size:16px;letter-spacing:.12em;color:var(--live);min-width:50px;text-align:right}
    .tele-u{font-size:10px;color:var(--dim)}
    #tMode{font-size:12px;text-transform:uppercase;color:var(--ink)}

    /* shutter */
    #shutterWrap{display:flex;gap:7px;margin-bottom:7px}
    .btn-mon{
      flex:1;padding:6px 0;font-family:var(--font);font-size:10px;
      letter-spacing:.12em;border:1px solid var(--border);background:var(--panel);
      cursor:pointer;border-radius:3px;
    }
    .btn-mon:disabled{opacity:.35;cursor:default}
    .btn-open{color:var(--live);border-color:#1a4a1a}
    .btn-open:hover:not(:disabled){background:#0a2a0a}
    .btn-close{color:var(--danger);border-color:#4a1a1a}
    .btn-close:hover:not(:disabled){background:#2a0a0a}
    #monShutterDenied{
      font-size:9px;color:var(--danger);letter-spacing:.04em;line-height:1.6;
      padding:6px 8px;border:1px solid #4a1a1a;border-radius:3px;margin-bottom:6px;
    }
    .shutter-stat{font-size:10px;color:var(--ink-dim);letter-spacing:.06em}

    /* sensor */
    #sensorList{display:flex;flex-direction:column;gap:5px}
    .sensor-empty{font-size:10px;color:var(--ink-dim);letter-spacing:.08em;padding:4px 0}
    .sensor-ent{
      display:flex;align-items:center;gap:8px;padding:5px 7px;
      border:1px solid var(--border);border-radius:3px;background:var(--panel);
      font-size:10px;letter-spacing:.06em;
    }
    .sensor-blip{
      width:8px;height:8px;border-radius:50%;flex-shrink:0;
      animation:sensor-pulse 1s ease-in-out infinite alternate;
    }
    @keyframes sensor-pulse{from{opacity:1;box-shadow:0 0 4px currentColor}to{opacity:.3;box-shadow:none}}
    .sensor-info{flex:1;color:var(--ink-dim)}
    .sensor-dist{color:var(--live);min-width:44px;text-align:right}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <span class="title">MONITOR // <b>PLATAFORMA "O DESERTO"</b></span>
    <span><span id="connDot"></span><span id="connTxt" style="font-size:10px;letter-spacing:.1em;color:var(--ink-dim)">CONECTANDO</span></span>
  </div>
  <div id="main">
    <div id="mapWrap">
      <div id="mapLbl">MAPA — CORTE VERTICAL</div>
      <canvas id="mapCv"></canvas>
      <div id="mapScale">1 célula = 4m × 4m<br><span id="mapDepthRange" style="color:var(--dim)">—</span></div>
    </div>
    <div id="sidebar">

      <div class="panel">
        <div class="panel-lbl">ESTADO DO SUBMERSÍVEL</div>
        <div id="subStatus" class="sub-status intacto">INTACTO</div>
        <div id="collisionBar"><div id="collisionFill"></div></div>
        <div id="collisionTxt">colisões: 0 / 30</div>
      </div>

      <div class="panel">
        <div class="panel-lbl">TELEMETRIA</div>
        <div class="tele-row">
          <span class="tele-k">PROF</span>
          <span id="tDepth" class="tele-v">----</span>
          <span class="tele-u">m</span>
        </div>
        <div class="tele-row">
          <span class="tele-k">BRG</span>
          <span id="tHeading" class="tele-v">---</span>
          <span class="tele-u">°</span>
        </div>
        <div class="tele-row">
          <span class="tele-k">MODO</span>
          <span id="tMode" class="tele-v" style="font-size:12px">--</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-lbl">SHUTTER DO VISOR</div>
        <div id="shutterWrap">
          <button id="monShutterOpen" class="btn-mon btn-open">ABRIR</button>
          <button id="monShutterClose" class="btn-mon btn-close">FECHAR</button>
        </div>
        <div id="monShutterDenied" style="display:none">ACESSO NEGADO.<br>Perigo a Integridade do Submarino.</div>
        <div id="monShutterStatus" class="shutter-stat">—</div>
      </div>

      <div class="panel" style="flex:1">
        <div class="panel-lbl">SENSOR DE MOVIMENTO</div>
        <div id="sensorList"><div class="sensor-empty">nenhuma leitura</div></div>
      </div>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ===== MUNDO (espelha submarino.html) =====
  const UNITS_PER_M=10, TILE=40;
  const X_MIN_W=-400;
  const GRID_COLS=21, GRID_ROWS=640;

  const MAP=(()=>{
    const m=Array.from({length:GRID_ROWS},()=>new Uint8Array(GRID_COLS).fill(1));
    const open=(r0,r1,c0,c1)=>{
      for(let r=Math.max(0,r0);r<=Math.min(GRID_ROWS-1,r1);r++)
        for(let c=Math.max(0,c0);c<=Math.min(GRID_COLS-1,c1);c++) m[r][c]=0;
    };
    open(25,29,9,11);
    open(30,49,8,12);
    open(50,74,8,12);
    open(75,124,4,16);
    open(115,130,13,19); open(130,160,14,19); open(155,200,13,18); open(197,207,11,18);
    open(125,239,8,12);
    open(240,280,7,15);
    open(280,459,8,12);
    open(460,472,7,13);
    open(473,508,9,11);
    open(509,589,8,12);
    open(590,632,3,17);
    open(100,130,3,6); open(130,180,2,6); open(175,192,2,9); open(185,225,4,7);
    open(190,210,14,19); open(200,265,17,20); open(250,285,13,20); open(270,300,15,18);
    return m;
  })();

  // ===== ESTADO LOCAL =====
  const UNITS_DEPTH_SHUTTER = 10000; // 1000m display
  let nav = {x:0, depth:2000, heading:0, mode:"moonpool"};
  let wallHits = 0;
  let entities = {};
  let shutterVal = "auto";
  let connected = false;

  const subRef = sessionRef.child("submarine");

  // ===== CANVAS =====
  const CELL_W = 14, CELL_H = 3;
  const mcv = document.getElementById("mapCv");
  const mctx = mcv.getContext("2d");
  const mapWrap = document.getElementById("mapWrap");

  function resizeCanvas(){
    const h = mapWrap.clientHeight - 60; // label + scale
    mcv.width = GRID_COLS * CELL_W;
    mcv.height = Math.max(200, h);
  }
  window.addEventListener("resize", ()=>{ resizeCanvas(); drawMap(); });
  resizeCanvas();

  // ===== DESENHO DO MAPA =====
  function drawMap(){
    const W = mcv.width, H = mcv.height;
    const rowsVisible = H / CELL_H;
    const subRow = nav.depth / TILE;
    const subCol = (nav.x - X_MIN_W) / TILE;

    // viewStart: sub fica em 35% de cima
    const viewStart = Math.max(0, subRow - rowsVisible * 0.35);

    mctx.fillStyle = '#030803';
    mctx.fillRect(0, 0, W, H);

    // grade de tiles
    for(let r = Math.floor(viewStart); r <= Math.ceil(viewStart + rowsVisible) && r < GRID_ROWS; r++){
      const py = (r - viewStart) * CELL_H;
      for(let c = 0; c < GRID_COLS; c++){
        const px = c * CELL_W;
        const isOpen = MAP[r] && MAP[r][c]===0;
        if(!isOpen){
          mctx.fillStyle = '#0f110f';
        } else if(r < 50){
          mctx.fillStyle = '#091424'; // área da estação
        } else if(r >= 590){
          mctx.fillStyle = '#0a1a14'; // caverna hive-mind
        } else {
          mctx.fillStyle = '#081520'; // água aberta
        }
        mctx.fillRect(px, py, CELL_W - 1, CELL_H - 1);
      }
    }

    // marcadores de profundidade a cada 500m
    mctx.font = '8px monospace';
    for(let m500 = 0; m500 <= 2600; m500 += 100){
      const depthWu = m500 * UNITS_PER_M;
      const r = depthWu / TILE;
      const py = (r - viewStart) * CELL_H;
      if(py < -10 || py > H + 10) continue;
      if(m500 % 500 === 0){
        mctx.strokeStyle = 'rgba(80,140,80,0.35)';
        mctx.lineWidth = 1;
        mctx.beginPath(); mctx.moveTo(0,py); mctx.lineTo(W,py); mctx.stroke();
        mctx.fillStyle = 'rgba(90,160,90,0.6)';
        mctx.fillText(m500+'m', 2, py - 2);
      } else if(m500 % 100 === 0){
        mctx.strokeStyle = 'rgba(50,90,50,0.18)';
        mctx.lineWidth = 1;
        mctx.beginPath(); mctx.moveTo(0,py); mctx.lineTo(W,py); mctx.stroke();
      }
    }

    // entidades visíveis em modo approach (sensor de movimento)
    const now = Date.now();
    Object.values(entities).forEach(ent => {
      if(!ent || ent.visible===false || ent.mode!=="approach") return;
      if(typeof ent.wx !== "number") return;
      const er = ent.wd / TILE;
      const ec = (ent.wx - X_MIN_W) / TILE;
      const px = ec * CELL_W;
      const py = (er - viewStart) * CELL_H;
      if(py < -20 || py > H + 20) return;
      const col = ent.color || '#ff4040';
      const pulse = 0.5 + 0.5 * Math.sin(now / 400);
      const r=parseInt(col.slice(1,3),16), g=parseInt(col.slice(3,5),16), b=parseInt(col.slice(5,7),16);
      const gr = mctx.createRadialGradient(px,py,0,px,py,10);
      gr.addColorStop(0,`rgba(${r},${g},${b},${0.5*pulse})`);
      gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
      mctx.fillStyle=gr; mctx.beginPath(); mctx.arc(px,py,10,0,Math.PI*2); mctx.fill();
      mctx.fillStyle=col;
      mctx.beginPath(); mctx.arc(px,py,2.5,0,Math.PI*2); mctx.fill();
    });

    // sub — glow + dot + linha de heading
    const spx = subCol * CELL_W;
    const spy = (subRow - viewStart) * CELL_H;
    const pulse = 0.7 + 0.3 * Math.sin(now / 500);
    const gr = mctx.createRadialGradient(spx,spy,0,spx,spy,14);
    gr.addColorStop(0, `rgba(125,255,125,${0.6*pulse})`);
    gr.addColorStop(1, 'rgba(125,255,125,0)');
    mctx.fillStyle = gr;
    mctx.beginPath(); mctx.arc(spx,spy,14,0,Math.PI*2); mctx.fill();
    // heading: 0=baixo, ângulo em radianos
    const hRad = nav.heading * Math.PI / 180;
    const arrowLen = 9;
    mctx.strokeStyle = '#7dff7d';
    mctx.lineWidth = 1.5;
    mctx.beginPath();
    mctx.moveTo(spx, spy);
    mctx.lineTo(spx + Math.sin(hRad)*arrowLen, spy + Math.cos(hRad)*arrowLen * (CELL_H/CELL_W) * 4);
    mctx.stroke();
    mctx.fillStyle = '#7dff7d';
    mctx.beginPath(); mctx.arc(spx,spy,3,0,Math.PI*2); mctx.fill();

    // range info
    const topM = Math.round(viewStart * TILE / UNITS_PER_M);
    const botM = Math.round((viewStart + rowsVisible) * TILE / UNITS_PER_M);
    document.getElementById("mapDepthRange").textContent = topM + 'm — ' + botM + 'm visível';
  }

  // ===== HUD LATERAL =====
  const SHUTTER_STATUS = {
    "auto":"modo: automático (profundidade)",
    "force_open":"modo: FORÇADO ABERTO",
    "force_closed":"modo: FORÇADO FECHADO"
  };

  function updateHUD(){
    const depthM = Math.round(nav.depth / UNITS_PER_M);
    document.getElementById("tDepth").textContent = String(depthM).padStart(4,"0");
    document.getElementById("tHeading").textContent = String(Math.round(nav.heading)).padStart(3,"0");
    document.getElementById("tMode").textContent = nav.mode || "--";

    // estado do submarino
    const hits = wallHits || 0;
    const pct = Math.min(100, (hits/30)*100);
    document.getElementById("collisionFill").style.width = pct + "%";
    document.getElementById("collisionFill").style.background =
      hits >= 30 ? "var(--danger)" : hits >= 20 ? "var(--warn)" : "var(--live)";
    document.getElementById("collisionTxt").textContent = "colisões: " + hits + " / 30";
    const el = document.getElementById("subStatus");
    if(hits >= 30){
      el.textContent = "PERIGO IMEDIATO"; el.className = "sub-status perigo";
    } else if(hits >= 20){
      el.textContent = "DANIFICADO"; el.className = "sub-status danificado";
    } else {
      el.textContent = "INTACTO"; el.className = "sub-status intacto";
    }

    // shutter
    const depthOk = nav.depth < UNITS_DEPTH_SHUTTER;
    const denied = document.getElementById("monShutterDenied");
    const wrap = document.getElementById("shutterWrap");
    denied.style.display = depthOk ? "none" : "block";
    wrap.style.display = depthOk ? "flex" : "none";
    document.getElementById("monShutterStatus").textContent = SHUTTER_STATUS[shutterVal] || "—";

    // sensor de movimento
    const moving = Object.entries(entities).filter(([,e])=>e&&e.visible!==false&&e.mode==="approach"&&typeof e.wx==="number");
    const list = document.getElementById("sensorList");
    if(!moving.length){
      list.innerHTML = '<div class="sensor-empty">nenhuma leitura</div>';
    } else {
      list.innerHTML = moving.map(([id,e])=>{
        const dx = e.wx - nav.x;
        const dd = e.wd - nav.depth;
        const dist = Math.round(Math.hypot(dx,dd) / UNITS_PER_M);
        const bearing = Math.round(Math.atan2(dx,dd) * 180/Math.PI + 360) % 360;
        const col = e.color || '#ff4040';
        return `<div class="sensor-ent">
          <div class="sensor-blip" style="background:${col};box-shadow:0 0 5px ${col}"></div>
          <div class="sensor-info">BRG ${String(bearing).padStart(3,"0")}°</div>
          <div class="sensor-dist">${dist}m</div>
        </div>`;
      }).join("");
    }
  }

  // ===== LOOP DE RENDERIZAÇÃO =====
  let rafId = null;
  function loop(){
    drawMap();
    updateHUD();
    rafId = requestAnimationFrame(loop);
  }

  // ===== FIREBASE =====
  const connRef = firebase.database().ref(".info/connected");
  connRef.on("value", s=>{
    connected = !!s.val();
    document.getElementById("connDot").className = connected ? "on" : "";
    document.getElementById("connTxt").textContent = connected ? "CONECTADO" : "RECONECTANDO";
  });

  subRef.child("nav").on("value", s=>{
    const n = s.val(); if(!n) return;
    if(typeof n.x==="number") nav.x=n.x;
    if(typeof n.depth==="number") nav.depth=n.depth;
    if(typeof n.heading==="number") nav.heading=n.heading;
    if(n.mode) nav.mode=n.mode;
  });

  subRef.child("wallHits").on("value", s=>{ wallHits = s.val()||0; });

  subRef.child("entities").on("value", s=>{ entities = s.val()||{}; });

  subRef.child("shutter").on("value", s=>{ shutterVal = s.val()||"auto"; });

  // shutter buttons (só disponíveis se depth < 1000m)
  document.getElementById("monShutterOpen").addEventListener("click",()=>{
    if(nav.depth >= UNITS_DEPTH_SHUTTER) return;
    subRef.child("shutter").set("force_open");
  });
  document.getElementById("monShutterClose").addEventListener("click",()=>{
    if(nav.depth >= UNITS_DEPTH_SHUTTER) return;
    subRef.child("shutter").set("force_closed");
  });

  resizeCanvas();
  loop();
</script>
</body>
</html>
