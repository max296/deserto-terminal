<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MONITOR // PLATAFORMA O DESERTO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0d12;
      --panel:#0f1520;
      --border:#1c2b3d;
      --live:#4c8fc8;
      --live-dim:#2c5578;
      --dim:#182e46;
      --ink:#7aa0bc;
      --ink-dim:#3d5c78;
      --danger:#c04040;
      --warn:#b07828;
      --font:'Courier New',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
    #app{display:flex;flex-direction:column;height:100%}

    /* HEADER */
    #header{
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 16px;border-bottom:1px solid var(--border);
      font-size:10px;letter-spacing:.2em;flex-shrink:0;
      background:rgba(20,40,70,.18);
    }
    #header .title{color:var(--ink-dim)}
    #header .title b{color:var(--live)}
    #connDot{width:7px;height:7px;border-radius:50%;background:var(--danger);display:inline-block;margin-right:6px;animation:blink 1s step-end infinite}
    #connDot.on{background:var(--live);animation:none}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* MAIN: mapa à esquerda + sonar à direita */
    #main{display:flex;flex:1;min-height:0}

    #mapWrap{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#090c11;border-right:1px solid var(--border);padding:10px 12px;
    }
    #mapLbl{font-size:8px;letter-spacing:.18em;color:var(--ink-dim);margin-bottom:6px}
    #mapCv{display:block;image-rendering:pixelated;border:1px solid var(--border);}
    #mapFooter{font-size:8px;color:var(--ink-dim);margin-top:5px;text-align:center;letter-spacing:.06em;line-height:1.6}
    #mapVignette{position:relative;pointer-events:none}
    #mapVignette::before,#mapVignette::after{
      content:'';position:absolute;left:0;right:0;height:24px;z-index:2;
    }
    #mapVignette::before{top:0;background:linear-gradient(to bottom,#090c11,transparent)}
    #mapVignette::after{bottom:0;background:linear-gradient(to top,#090c11,transparent)}

    /* SONAR */
    #sonarWrap{
      width:300px;flex-shrink:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:14px 14px;border-left:1px solid var(--border);background:var(--panel);
    }
    .panel-lbl{font-size:8px;letter-spacing:.2em;color:var(--ink-dim);margin-bottom:10px}
    #monSonarCv{display:block;border:1px solid var(--border);image-rendering:pixelated}
    #monSonarStatus{font-size:9px;color:var(--ink-dim);letter-spacing:.08em;text-align:center;margin-top:8px}

    /* BOTTOM BAR: strip horizontal de controles */
    #bottomBar{
      display:flex;flex-shrink:0;height:116px;
      border-top:1px solid var(--border);background:rgba(9,14,24,.7);
    }
    .bp{
      flex:1;padding:10px 16px;border-right:1px solid var(--border);
      display:flex;flex-direction:column;justify-content:center;
    }
    .bp:last-child{border-right:none}
    .bp-lbl{font-size:8px;letter-spacing:.2em;color:var(--ink-dim);margin-bottom:8px}

    /* casco */
    #subStatus{
      font-size:15px;letter-spacing:.22em;font-weight:bold;padding:2px 0;
      transition:color .4s;
    }
    #subStatus.intacto{color:var(--live)}
    #subStatus.danificado{color:var(--warn)}
    #subStatus.perigo{color:var(--danger);animation:pdanger .55s ease-in-out infinite alternate}
    @keyframes pdanger{from{opacity:1}to{opacity:.35}}
    .state-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
    .state-fill{height:100%;border-radius:2px;width:0%;transition:width .5s,background .5s}

    /* telemetria */
    .tele-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
    .tele-k{font-size:8px;color:var(--ink-dim);letter-spacing:.16em;min-width:42px}
    .tele-v{font-size:15px;letter-spacing:.08em;color:var(--live);min-width:50px;text-align:right}
    .tele-u{font-size:8px;color:var(--dim);letter-spacing:.08em}

    /* botões */
    .btn-mon{
      width:100%;padding:6px 0;font-family:var(--font);font-size:9px;letter-spacing:.14em;
      border:1px solid var(--border);background:var(--panel);color:var(--ink);
      cursor:pointer;border-radius:2px;margin-bottom:4px;transition:background .15s,border-color .15s;
    }
    .btn-mon:last-child{margin-bottom:0}
    .btn-mon:hover:not(:disabled){background:rgba(76,143,200,.1);border-color:var(--live-dim)}
    .btn-mon:disabled{opacity:.3;cursor:default}
    .btn-reel{color:var(--live);border-color:var(--live-dim)}
    .btn-reel:hover:not(:disabled){background:rgba(76,143,200,.12)!important}
    .btn-open{color:#6ec882;border-color:#0a3020}
    .btn-open:hover:not(:disabled){background:rgba(0,180,80,.08)!important}
    .btn-close{color:var(--danger);border-color:#3a1010}
    .btn-close:hover:not(:disabled){background:rgba(200,40,40,.08)!important}

    .stat-txt{font-size:9px;color:var(--ink-dim);letter-spacing:.06em;margin-top:4px}
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <span class="title">MONITOR // <b>PLATAFORMA "O DESERTO"</b></span>
    <span>
      <span id="connDot"></span>
      <span id="connTxt" style="font-size:10px;letter-spacing:.1em;color:var(--ink-dim)">CONECTANDO</span>
    </span>
  </div>

  <div id="main">

    <div id="mapWrap">
      <div id="mapLbl">POSIÇÃO — SENSOR LOCAL</div>
      <div id="mapVignette"><canvas id="mapCv"></canvas></div>
      <div id="mapFooter">
        raio: ~120m<br>
        <span id="mapDepthLbl" style="color:var(--dim)">—</span>
      </div>
    </div>

    <div id="sonarWrap">
      <div class="panel-lbl">SENSOR DE MOVIMENTO</div>
      <canvas id="monSonarCv" width="260" height="260"></canvas>
      <div id="monSonarStatus">nenhum movimento detectado</div>
    </div>

  </div>

  <div id="bottomBar">

    <div class="bp">
      <div class="bp-lbl">INTEGRIDADE DO CASCO</div>
      <div id="subStatus" class="intacto">INTACTO</div>
      <div class="state-bar"><div id="stateFill" class="state-fill"></div></div>
    </div>

    <div class="bp">
      <div class="bp-lbl">TELEMETRIA</div>
      <div class="tele-row">
        <span class="tele-k">PROF</span>
        <span id="tDepth" class="tele-v">----</span>
        <span class="tele-u">m</span>
      </div>
      <div class="tele-row">
        <span class="tele-k">BRG</span>
        <span id="tHeading" class="tele-v">---</span>
        <span class="tele-u">°</span>
      </div>
      <div class="tele-row">
        <span class="tele-k">MODO</span>
        <span id="tMode" class="tele-v" style="font-size:11px;letter-spacing:.06em">--</span>
      </div>
    </div>

    <div class="bp">
      <div class="bp-lbl">CONTROLE DE EMERGÊNCIA</div>
      <button id="btnReel" class="btn-mon btn-reel" disabled>↑ PUXAR DE VOLTA</button>
      <div id="reelStatus" class="stat-txt">—</div>
    </div>

    <div class="bp">
      <div class="bp-lbl">SHUTTER DO VISOR</div>
      <div id="shutterWrap" style="display:flex;gap:6px;margin-bottom:5px">
        <button id="monShutterOpen" class="btn-mon btn-open" style="width:auto;flex:1;margin:0;padding:5px 0">ABRIR</button>
        <button id="monShutterClose" class="btn-mon btn-close" style="width:auto;flex:1;margin:0;padding:5px 0">FECHAR</button>
      </div>
      <div id="monShutterDenied" style="display:none;font-size:8px;color:var(--danger);letter-spacing:.04em;line-height:1.7">
        ACESSO NEGADO.<br>Perigo à Integridade do Submarino.
      </div>
      <div id="monShutterStatus" class="stat-txt">—</div>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ===== MUNDO (espelha submarino.html) =====
  const UNITS_PER_M=10, TILE=40;
  const X_MIN_W=-400;
  const GRID_COLS=21, GRID_ROWS=640;

  const MAP=(()=>{
    const m=Array.from({length:GRID_ROWS},()=>new Uint8Array(GRID_COLS).fill(1));
    const open=(r0,r1,c0,c1)=>{
      for(let r=Math.max(0,r0);r<=Math.min(GRID_ROWS-1,r1);r++)
        for(let c=Math.max(0,c0);c<=Math.min(GRID_COLS-1,c1);c++) m[r][c]=0;
    };
    open(25,29,9,11);  open(30,49,8,12);   open(50,74,8,12);
    open(75,124,4,16);
    open(115,130,13,19); open(130,160,14,19); open(155,200,13,18); open(197,207,11,18);
    open(125,239,8,12);
    open(240,280,7,15);
    open(280,459,8,12);
    open(460,472,7,13); open(473,508,9,11); open(509,589,8,12); open(590,632,3,17);
    open(100,130,3,6);  open(130,180,2,6);  open(175,192,2,9);  open(185,225,4,7);
    open(190,210,14,19); open(200,265,17,20); open(250,285,13,20); open(270,300,15,18);
    return m;
  })();

  // ===== ESTADO =====
  const DEPTH_SHUTTER = 10000; // 1000m wu
  const HULL_WARN=20, HULL_CRIT=30;
  const CELL_W=20, CELL_H=6;
  // raio de visibilidade simétrico: sub no centro do mapa
  const VIS_ABOVE=40, VIS_BELOW=40;

  let nav={x:0, depth:2000, heading:0, mode:"moonpool"};
  let hullDamage=0;
  let entities={};
  let shutterVal="auto";
  let navPathData=[];

  const subRef=sessionRef.child("submarine");

  // ===== CANVAS =====
  const mcv=document.getElementById("mapCv");
  const mctx=mcv.getContext("2d");
  mcv.width=GRID_COLS*CELL_W;
  mcv.height=(VIS_ABOVE+VIS_BELOW)*CELL_H;

  // ===== DESENHO =====
  function drawMap(){
    const W=mcv.width, H=mcv.height;
    const subRow=nav.depth/TILE;
    const subCol=(nav.x-X_MIN_W)/TILE;
    const viewStart=subRow-VIS_ABOVE;  // pode ser fracionário

    mctx.fillStyle='#090c11';
    mctx.fillRect(0,0,W,H);

    // tiles visíveis
    const rStart=Math.floor(viewStart);
    const rEnd=Math.ceil(viewStart+VIS_ABOVE+VIS_BELOW);
    for(let r=Math.max(0,rStart);r<=Math.min(GRID_ROWS-1,rEnd);r++){
      const py=(r-viewStart)*CELL_H;
      for(let c=0;c<GRID_COLS;c++){
        const px=c*CELL_W;
        const open=MAP[r]&&MAP[r][c]===0;
        if(!open){
          mctx.fillStyle='#060f18';
        } else if(r<50){
          mctx.fillStyle='#06142a';
        } else if(r>=590){
          mctx.fillStyle='#04182a';
        } else {
          mctx.fillStyle='#04111e';
        }
        mctx.fillRect(px,py,CELL_W-1,CELL_H-1);
      }
    }

    // marcadores de profundidade a cada 200m
    mctx.font='8px monospace';
    for(let md=0;md<=2600;md+=100){
      const r=(md*UNITS_PER_M)/TILE;
      const py=(r-viewStart)*CELL_H;
      if(py<-8||py>H+8) continue;
      mctx.strokeStyle=md%200===0?'rgba(0,100,160,.3)':'rgba(0,60,100,.14)';
      mctx.lineWidth=1;
      mctx.beginPath(); mctx.moveTo(0,py); mctx.lineTo(W,py); mctx.stroke();
      if(md%200===0){
        mctx.fillStyle='rgba(0,120,180,.55)';
        mctx.fillText(md+'m',2,py-2);
      }
    }

    // sub — glow azul + ponto + heading
    const spx=subCol*CELL_W, spy=(subRow-viewStart)*CELL_H;
    // cabo
    if(navPathData.length>0){
      const moonPy=(1000/TILE-viewStart)*CELL_H;
      const moonPx=((-X_MIN_W)/TILE)*CELL_W;
      mctx.save();
      mctx.strokeStyle='rgba(100,170,255,0.3)';
      mctx.lineWidth=1; mctx.setLineDash([2,3]);
      mctx.beginPath(); mctx.moveTo(moonPx,moonPy);
      navPathData.forEach(pt=>{
        mctx.lineTo(((pt.x||0)-X_MIN_W)/TILE*CELL_W, ((pt.depth||0)/TILE-viewStart)*CELL_H);
      });
      mctx.lineTo(spx,spy);
      mctx.stroke(); mctx.setLineDash([]); mctx.restore();
    }
    const pulse=0.65+0.35*Math.sin(Date.now()/520);
    const gr=mctx.createRadialGradient(spx,spy,0,spx,spy,16);
    gr.addColorStop(0,`rgba(76,143,200,${0.55*pulse})`);
    gr.addColorStop(1,'rgba(76,143,200,0)');
    mctx.fillStyle=gr; mctx.beginPath(); mctx.arc(spx,spy,16,0,Math.PI*2); mctx.fill();
    const hRad=nav.heading*Math.PI/180;
    mctx.strokeStyle='#4c8fc8'; mctx.lineWidth=1.5;
    mctx.beginPath(); mctx.moveTo(spx,spy);
    mctx.lineTo(spx+Math.sin(hRad)*10, spy+Math.cos(hRad)*10*(CELL_H/CELL_W)*3.5);
    mctx.stroke();
    mctx.fillStyle='#4c8fc8'; mctx.beginPath(); mctx.arc(spx,spy,3,0,Math.PI*2); mctx.fill();

    document.getElementById("mapDepthLbl").textContent=
      Math.round(nav.depth/UNITS_PER_M)+'m — campo: '+(VIS_ABOVE+VIS_BELOW)*4+'m';
  }

  // ===== HUD LATERAL =====
  const SHUTTER_LABELS={
    "auto":"automático (profundidade)",
    "force_open":"FORÇADO ABERTO",
    "force_closed":"FORÇADO FECHADO"
  };

  function updateHUD(){
    // telemetria
    document.getElementById("tDepth").textContent=String(Math.round(nav.depth/UNITS_PER_M)).padStart(4,"0");
    document.getElementById("tHeading").textContent=String(Math.round(nav.heading)).padStart(3,"0");
    document.getElementById("tMode").textContent=(nav.mode||"--").toUpperCase();

    // integridade do casco (sem números)
    const el=document.getElementById("subStatus");
    const fill=document.getElementById("stateFill");
    const pct=Math.min(100,(hullDamage/HULL_CRIT)*100);
    fill.style.width=pct+"%";
    if(hullDamage>=HULL_CRIT){
      el.textContent="PERIGO IMEDIATO"; el.className="perigo";
      fill.style.background="var(--danger)";
    } else if(hullDamage>=HULL_WARN){
      el.textContent="DANIFICADO"; el.className="danificado";
      fill.style.background="var(--warn)";
    } else {
      el.textContent="INTACTO"; el.className="intacto";
      fill.style.background="var(--live)";
    }

    // puxar de volta
    const btnReel=document.getElementById("btnReel");
    const reelSt=document.getElementById("reelStatus");
    if(nav.mode==="moonpool"){
      btnReel.disabled=true; reelSt.textContent="submersível na superfície";
    } else if(nav.mode==="reeling"){
      btnReel.disabled=true; reelSt.textContent="RECOLHENDO...";
    } else {
      btnReel.disabled=false; reelSt.textContent="disponível";
    }

    // shutter
    const depthOk=nav.depth<DEPTH_SHUTTER;
    document.getElementById("monShutterDenied").style.display=depthOk?"none":"block";
    document.getElementById("shutterWrap").style.display=depthOk?"flex":"none";
    document.getElementById("monShutterStatus").textContent=SHUTTER_LABELS[shutterVal]||"—";
  }

  // ===== SONAR DE MOVIMENTO (verde, estilo jogadores) =====
  const MS_W=260, MS_H=260, MS_CX=130, MS_CY=130;
  const MS_SCALE=1.3; // 100m = 130px = MS_CX

  let entityBlipsM={}, sonarScanMT=0;

  function rotForMonitor(dx,dy){
    const α=(nav.heading||0)*Math.PI/180-Math.PI;
    const ca=Math.cos(α),sa=Math.sin(α);
    return {dx:dx*ca-dy*sa, dy:dx*sa+dy*ca};
  }

  function drawMonBlip(ctx,bx,by,alpha){
    const g=ctx.createRadialGradient(bx,by,0,bx,by,14);
    g.addColorStop(0,`rgba(0,255,100,${alpha*0.65})`); g.addColorStop(1,"rgba(0,255,100,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bx,by,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(120,255,160,${alpha})`;
    ctx.beginPath(); ctx.arc(bx,by,3,0,Math.PI*2); ctx.fill();
  }

  function drawMonitorSonar(){
    const cv2=document.getElementById("monSonarCv");
    const ctx=cv2.getContext("2d");
    const CX=MS_CX, CY=MS_CY;
    ctx.fillStyle="#040a04"; ctx.fillRect(0,0,MS_W,MS_H);

    // círculos de alcance
    ctx.strokeStyle="#081808"; ctx.lineWidth=1;
    [25,50,75,100].forEach(m=>{
      ctx.beginPath(); ctx.arc(CX,CY,m*MS_SCALE,0,Math.PI*2); ctx.stroke();
    });
    ctx.strokeStyle="#0a200a"; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(CX,3); ctx.lineTo(CX,MS_H-3);
    ctx.moveTo(3,CY); ctx.lineTo(MS_W-3,CY); ctx.stroke();
    ctx.fillStyle="#0d280d"; ctx.font="8px monospace"; ctx.textAlign="left";
    [25,50,75].forEach(m=>ctx.fillText(m+"m",CX+m*MS_SCALE+2,CY-2));

    // anel de varredura
    const ringAge=(Date.now()-sonarScanMT)/2000;
    if(ringAge<1){
      ctx.strokeStyle=`rgba(0,220,80,${(1-ringAge)*0.45})`; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(CX,CY,ringAge*CX,0,Math.PI*2); ctx.stroke();
    }

    // blips (entidades approach visíveis)
    const tnow=Date.now(),tsec=tnow/1000;
    let idx=0;
    Object.entries(entityBlipsM).forEach(([,eb])=>{
      if(!eb||!eb.pos) return;
      const pa=Math.max(0.12,1-(tnow-eb.born)/2000*0.85);
      const j={dx:Math.sin(tsec*0.83+idx)*0.9+Math.sin(tsec*2.07+idx)*0.5,
               dy:Math.sin(tsec*1.13+idx+1.2)*0.8+Math.sin(tsec*0.67+idx+2.4)*0.6};
      const rp=rotForMonitor(eb.pos.dx,eb.pos.dy);
      const rx=(rp.dx+j.dx)/UNITS_PER_M*MS_SCALE;
      const ry=(rp.dy+j.dy)/UNITS_PER_M*MS_SCALE;
      if(CX+rx<4||CX+rx>MS_W-4||CY+ry<4||CY+ry>MS_H-4){idx++;return;}
      drawMonBlip(ctx,CX+rx,CY+ry,pa);
      idx++;
    });

    // sub no centro
    const sg=ctx.createRadialGradient(CX,CY,0,CX,CY,8);
    sg.addColorStop(0,"rgba(0,220,255,.5)"); sg.addColorStop(1,"rgba(0,220,255,0)");
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(CX,CY,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#e0e0e0"; ctx.beginPath(); ctx.arc(CX,CY,3,0,Math.PI*2); ctx.fill();

    const n=Object.keys(entityBlipsM).length;
    document.getElementById("monSonarStatus").textContent=
      n?`${n} objeto${n>1?"s":""} detectado${n>1?"s":""}`:"nenhum movimento detectado";
  }

  // Calcula posição de approach pela trajetória armazenada — mesmo modelo do guardião
  function getApproachPos(ent, now) {
    if(typeof ent.wx!=="number"||!ent.lastUpdateTime) return {wx:ent.wx||0,wd:ent.wd||0};
    const elapsed=Math.max(0,(now-ent.lastUpdateTime)/1000);
    const dx=(ent.tx||0)-ent.wx, dd=(ent.td||0)-ent.wd;
    const dist=Math.hypot(dx,dd);
    if(dist<1||!(ent.speed>0)) return {wx:ent.wx,wd:ent.wd};
    const moved=Math.min(elapsed*ent.speed,dist);
    return {wx:ent.wx+(dx/dist)*moved, wd:ent.wd+(dd/dist)*moved};
  }

  function sonarTickM(){
    const t=Date.now();
    Object.entries(entities).forEach(([id,ent])=>{
      if(!ent||ent.visible===false){ delete entityBlipsM[id]; return; }
      let wx, wd;
      if((ent.mode==="fish"||ent.mode==="creature")&&typeof ent.wx==="number"){
        wx=ent.wx; wd=ent.wd;
      } else if(ent.mode==="approach"&&typeof ent.wx==="number"){
        const pos=getApproachPos(ent,t); wx=pos.wx; wd=pos.wd;
      } else {
        wx=(nav.x||0)+(ent.dx||0); wd=(nav.depth||1000)+(ent.dy||0);
      }
      entityBlipsM[id]={pos:{dx:wx-nav.x, dy:wd-nav.depth}, born:t};
    });
    Object.keys(entityBlipsM).forEach(id=>{
      if(!entities[id]||entities[id].visible===false) delete entityBlipsM[id];
    });
    sonarScanMT=t;
  }

  setInterval(sonarTickM,2000);
  sonarTickM();

  // ===== LOOP =====
  function loop(){ drawMap(); updateHUD(); drawMonitorSonar(); requestAnimationFrame(loop); }

  // ===== FIREBASE =====
  firebase.database().ref(".info/connected").on("value",s=>{
    const on=!!s.val();
    document.getElementById("connDot").className=on?"on":"";
    document.getElementById("connTxt").textContent=on?"CONECTADO":"RECONECTANDO";
  });
  subRef.child("nav").on("value",s=>{const n=s.val();if(!n)return;if(typeof n.x==="number")nav.x=n.x;if(typeof n.depth==="number")nav.depth=n.depth;if(typeof n.heading==="number")nav.heading=n.heading;if(n.mode)nav.mode=n.mode;});
  subRef.child("hullDamage").on("value",s=>{hullDamage=s.val()||0;});
  subRef.child("entities").on("value",s=>{entities=s.val()||{};});
  subRef.child("shutter").on("value",s=>{shutterVal=s.val()||"auto";});
  subRef.child("navPath").on("value",s=>{const v=s.val(); navPathData=v?Object.values(v):[];});

  // puxar de volta
  document.getElementById("btnReel").addEventListener("click",()=>{
    if(nav.mode==="diving"||nav.mode==="reeling") subRef.child("nav/mode").set("reeling");
  });

  // shutter (só <1000m)
  document.getElementById("monShutterOpen").addEventListener("click",()=>{
    if(nav.depth<DEPTH_SHUTTER) subRef.child("shutter").set("force_open");
  });
  document.getElementById("monShutterClose").addEventListener("click",()=>{
    if(nav.depth<DEPTH_SHUTTER) subRef.child("shutter").set("force_closed");
  });

  loop();
</script>
</body>
</html>
