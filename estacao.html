<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEUROSTAT // PLATFORM SYSTEMS</title>
<style>
  /* ---- NeuroStat: azul-clinico frio, tecnico, levemente errado ---- */
  :root{
    --bg:#070b0e;
    --panel:#0c1418;
    --line:#16323a;
    --ink:#9fc6c9;          /* texto base, ciano dessaturado */
    --ink-dim:#456066;
    --live:#62e0c4;         /* verde-agua: o "ligado", frio */
    --warn:#d8a24a;         /* ambar de alerta */
    --locked:#1b2b30;
    --scan: rgba(98,224,196,.025);
    --font: "SFMono-Regular", ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font);
    font-size:14px;
    line-height:1.5;
    overflow:hidden;
    /* scanline ambiente sutil */
    background-image:repeating-linear-gradient(
      0deg, var(--scan) 0px, var(--scan) 1px, transparent 1px, transparent 3px);
  }
  /* leve vinheta uncanny nas bordas */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;
    box-shadow:inset 0 0 180px rgba(0,0,0,.85);
    z-index:50;
  }

  /* ================= STANDBY (terminal dormindo) ================= */
  #standby{
    position:fixed;inset:0;z-index:40;
    background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;
  }
  #standby .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--ink-dim);
    box-shadow:0 0 12px var(--ink-dim);
    animation:pulse 2.7s infinite;       /* ritmo proposital fora do "1s redondo" */
  }
  @keyframes pulse{0%,100%{opacity:.25}45%{opacity:.9}}
  #standby .msg{color:var(--ink-dim);letter-spacing:.28em;font-size:12px}
  #standby .sub{color:var(--ink-dim);opacity:.5;font-size:11px;letter-spacing:.1em}

  /* ================= TERMINAL ATIVO ================= */
  #terminal{display:none;height:100%;flex-direction:column}
  #terminal.on{display:flex}

  header{
    border-bottom:1px solid var(--line);
    padding:10px 16px;
    display:flex;justify-content:space-between;align-items:baseline;
    background:linear-gradient(180deg, #0a1216, transparent);
  }
  header .brand{letter-spacing:.34em;color:var(--ink);font-size:13px}
  header .brand b{color:var(--live);font-weight:600}
  header .node{color:var(--ink-dim);font-size:11px;letter-spacing:.18em}

  main{flex:1;display:flex;min-height:0}

  /* ----- coluna esquerda: o mapa vertical ----- */
  .mapwrap{
    width:300px;border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  .mapwrap .cap{
    padding:9px 14px;border-bottom:1px solid var(--line);
    font-size:10px;letter-spacing:.26em;color:var(--ink-dim);
  }
  .levels{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:0}

  /* cada andar empilhado verticalmente, do topo (heliponto) ao fundo (DRE) */
  .lvl{
    position:relative;
    border:1px solid var(--locked);
    border-bottom:none;
    padding:13px 14px;
    color:var(--locked);
    transition:all .45s ease;
    background:repeating-linear-gradient(45deg,#0a1014 0 6px,#0b1216 6px 12px);
  }
  .lvl:last-child{border-bottom:1px solid var(--locked)}
  .lvl .tag{font-size:10px;letter-spacing:.2em;opacity:.6}
  .lvl .name{font-size:13px;margin-top:2px;letter-spacing:.04em}
  .lvl .stat{
    position:absolute;right:12px;top:13px;font-size:9px;letter-spacing:.18em;
  }
  /* andar liberado pelo Guardiao */
  .lvl.live{
    border-color:var(--line);
    background:var(--panel);
    color:var(--ink);
  }
  .lvl.live .tag{color:var(--live);opacity:1}
  .lvl.live .stat{color:var(--live)}
  .lvl.live::before{
    content:"";position:absolute;left:-1px;top:-1px;bottom:-1px;width:2px;
    background:var(--live);box-shadow:0 0 8px var(--live);
  }
  /* andar em destaque (foco do Guardiao) */
  .lvl.focus{outline:1px solid var(--live);outline-offset:-1px}
  .lvl.focus .name{color:var(--live)}

  /* ----- coluna direita: leitura ----- */
  .read{flex:1;display:flex;flex-direction:column;min-height:0}
  .read .cap{
    padding:9px 16px;border-bottom:1px solid var(--line);
    font-size:10px;letter-spacing:.26em;color:var(--ink-dim);
    display:flex;justify-content:space-between;
  }
  .read .body{flex:1;overflow-y:auto;padding:22px 26px}
  .read .body .empty{color:var(--ink-dim);opacity:.55;font-size:12px;letter-spacing:.06em}
  .read .body h2{
    color:var(--live);font-size:14px;font-weight:600;letter-spacing:.1em;
    margin-bottom:14px;text-transform:uppercase;
  }
  .read .body p{margin-bottom:12px;max-width:62ch;color:var(--ink)}
  .read .body .meta{color:var(--ink-dim);font-size:11px;letter-spacing:.1em;margin-bottom:18px}

  footer{
    border-top:1px solid var(--line);padding:6px 16px;
    font-size:10px;letter-spacing:.18em;color:var(--ink-dim);
    display:flex;justify-content:space-between;
  }
  .blink{animation:bl 1.3s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}

  /* scrollbars discretas */
  ::-webkit-scrollbar{width:8px}
  ::-webkit-scrollbar-thumb{background:var(--line)}
  ::-webkit-scrollbar-track{background:transparent}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
  }
</style>
</head>
<body>

  <!-- ===== STANDBY ===== -->
  <div id="standby">
    <div class="dot"></div>
    <div class="msg">AWAITING UPLINK</div>
    <div class="sub">neurostat platform systems &nbsp;//&nbsp; node idle</div>
  </div>

  <!-- ===== TERMINAL ===== -->
  <div id="terminal">
    <header>
      <div class="brand"><b>NEUROSTAT</b> &nbsp;PLATFORM SYSTEMS</div>
      <div class="node">NODE: STATION-MAP &nbsp;/&nbsp; REV 4.4</div>
    </header>

    <main>
      <section class="mapwrap">
        <div class="cap">VERTICAL SECTION // PLATFORM</div>
        <div class="levels" id="levels"><!-- montado via JS --></div>
      </section>

      <section class="read">
        <div class="cap">
          <span id="readtitle">READOUT</span>
          <span id="readstat">—</span>
        </div>
        <div class="body" id="readbody">
          <div class="empty">No level selected. Awaiting access clearance.</div>
        </div>
      </section>
    </main>

    <footer>
      <span>UPLINK ACTIVE<span class="blink">_</span></span>
      <span id="clock">--:--:--</span>
    </footer>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ----- estrutura placeholder da plataforma (topo -> fundo) -----
  // Fatia 2 troca isso pela estrutura real / imagem.
  const LEVELS = [
    { id:"helipad",  tag:"L-07", name:"Helipad" },
    { id:"quarters", tag:"L-06", name:"Crew Quarters" },
    { id:"control",  tag:"L-05", name:"Control Center" },
    { id:"mess",     tag:"L-04", name:"Mess / Common Deck" },
    { id:"drill",    tag:"L-03", name:"Drilling Deck" },
    { id:"sub",      tag:"L-02", name:"Submerged Level" },
    { id:"dre",      tag:"L-??", name:"[ NO RECORD ]" }
  ];

  // conteudo de leitura por nivel (placeholder; Fatia 2 conecta arquivos/cameras)
  const READINGS = {
    helipad:  { h:"Helipad — L-07", meta:"LAST LANDING: 04:11 / OPERATIONAL", body:
      ["Upper landing platform. Traffic log intact up to the weekly communications failure.",
       "Fuel readings within expected range. No incidents."] },
    quarters: { h:"Crew Quarters — L-06", meta:"OCCUPANCY: 11 / 14 BUNKS", body:
      ["Rotating crew quarters. Three bunks show no use in the last window.",
       "Keycard access functional. Logs available on clearance."] },
    control:  { h:"Control Center — L-05", meta:"SYSTEMS: NOMINAL", body:
      ["Platform operations core. Centralized telemetry.",
       "Minor drift between internal clock and satellite. Within tolerance."] },
    mess:     { h:"Mess / Common Deck — L-04", meta:"CAMERAS: 2 ACTIVE", body:
      ["Common area. Momentary camera access available on operator clearance.",
       "No anomalies logged during this period."] },
    drill:    { h:"Drilling Deck — L-03", meta:"OPERATION: SUSPENDED", body:
      ["Drilling suspended by operational order. Equipment on standby.",
       "Intermittent background vibration of unmapped origin."] },
    sub:      { h:"Submerged Level — L-02", meta:"PRESSURE: ELEVATED", body:
      ["Structures below the waterline. Restricted access.",
       "Pressure reading above platform baseline."] },
    dre:      { h:"[ UNLOGGED SECTOR ]", meta:"DATA CORRUPTED", body:
      ["This level does not appear in the official NeuroStat schematic.",
       "Record partially recovered. Access requires local terminal."] }
  };

  const elLevels = document.getElementById("levels");
  const elBody   = document.getElementById("readbody");
  const elTitle  = document.getElementById("readtitle");
  const elStat   = document.getElementById("readstat");

  // monta o mapa
  LEVELS.forEach(l=>{
    const d=document.createElement("div");
    d.className="lvl"; d.dataset.id=l.id;
    d.innerHTML=`<div class="tag">${l.tag}</div>
                 <div class="name">${l.name}</div>
                 <div class="stat">LOCKED</div>`;
    elLevels.appendChild(d);
  });

  function renderReading(id){
    const r=READINGS[id];
    if(!r){ elBody.innerHTML=`<div class="empty">No readout for this level.</div>`; return; }
    elTitle.textContent = r.h.toUpperCase();
    elStat.textContent  = "ACCESS GRANTED";
    elBody.innerHTML = `<h2>${r.h}</h2><div class="meta">${r.meta}</div>` +
                       r.body.map(p=>`<p>${p}</p>`).join("");
  }

  // ---------- ESCUTA O ESTADO DO GUARDIAO ----------
  sessionRef.child("station").on("value", snap=>{
    const s = snap.val() || {};

    // liga / desliga o terminal
    const online = !!s.online;
    document.getElementById("standby").style.display  = online ? "none" : "flex";
    document.getElementById("terminal").className     = online ? "on" : "";

    // niveis liberados
    const unlocked = s.unlocked || {};
    document.querySelectorAll(".lvl").forEach(el=>{
      const on = !!unlocked[el.dataset.id];
      el.classList.toggle("live", on);
      el.querySelector(".stat").textContent = on ? "ACCESS" : "LOCKED";
    });

    // nivel em foco -> abre leitura
    const focus = s.focus || null;
    document.querySelectorAll(".lvl").forEach(el=>{
      el.classList.toggle("focus", el.dataset.id===focus);
    });
    if(focus && unlocked[focus]){
      renderReading(focus);
    } else if(!focus){
      elTitle.textContent="READOUT"; elStat.textContent="—";
      elBody.innerHTML=`<div class="empty">No level selected. Awaiting access clearance.</div>`;
    }
  });

  // relogio (com micro-desvio proposital pra sensacao uncanny)
  setInterval(()=>{
    const n=new Date();
    document.getElementById("clock").textContent =
      n.toTimeString().slice(0,8);
  },1000);
</script>
</body>
</html>
