<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBMERSIBLE // VIEWPORT</title>
<style>
  :root{--font:"SFMono-Regular",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#000}
  body{font-family:var(--font);color:#8a9a9c;user-select:none;-webkit-user-select:none;touch-action:none}

  #standby{position:fixed;inset:0;z-index:60;background:#05060a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  #standby .ring{width:14px;height:14px;border-radius:50%;border:2px solid #2a3a3a;border-top-color:#4a6a6a;animation:spin 2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #standby .msg{letter-spacing:.3em;font-size:12px;color:#3a4a4a}
  #standby .sub{font-size:10px;color:#2a3a3a;letter-spacing:.12em}

  #sub{position:fixed;inset:0;display:none}
  #sub.on{display:block}

  /* ===== camadas =====
     #viewport: a janela alinhada ao buraco do casco. Contém o breu.
     #abyss: canvas do mundo submerso.
     #moonpoolLayer: imagem da moonpool que rola.
     #hullImg: o casco PNG por cima, com o visor recortado.
  */
  #viewport{position:absolute;overflow:hidden;background:#02060a;z-index:2}
  /* suaviza o canto duro do recorte, mais no NeuroStat (visor menos quadrado) */
  #sub.old #viewport{border-radius:10px}
  #sub.modern #viewport{border-radius:7% / 9%}
  #abyss{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1}
  #moonpoolLayer{position:absolute;left:0;width:100%;z-index:2;background-size:cover;background-position:center top;will-change:transform;display:none}
  #splash{position:absolute;inset:0;width:100%;height:100%;z-index:3;display:none;pointer-events:none}
  /* vinheta escura nas bordas do visor: esconde artefatos da IA e dá profundidade */
  #viewportVignette{position:absolute;inset:0;z-index:3;pointer-events:none;
    box-shadow:inset 0 0 8vmin 2vmin rgba(0,0,0,.7), inset 0 0 2vmin rgba(0,0,0,.5)}
  /* reflexo do vidro: brilho diagonal sutil + curvatura. Responde à luz do facho. */
  #glassReflect{position:absolute;inset:0;z-index:3;pointer-events:none;mix-blend-mode:screen;opacity:.5;
    background:
      linear-gradient(135deg, rgba(170,200,210,.10) 0%, transparent 28%, transparent 72%, rgba(120,150,160,.06) 100%),
      radial-gradient(ellipse 120% 80% at 30% 20%, rgba(180,210,220,.08) 0%, transparent 50%);}
  /* leve curvatura/abaulamento do vidro nas bordas */
  #glassCurve{position:absolute;inset:0;z-index:3;pointer-events:none;
    box-shadow:inset 0 0 3vmin 1vmin rgba(120,160,170,.04);
    background:radial-gradient(ellipse 100% 100% at 50% 50%, transparent 60%, rgba(0,0,0,.15) 100%)}

  /* o casco preenche a tela (escurecido) */
  #hullImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:4;pointer-events:none;filter:brightness(.72)}
  #sub.old #hullImg{filter:brightness(.85)}

  /* escurecimento + luz piscante de cima (só no casco velho) */
  #flicker{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;
    background:linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.25) 30%, rgba(0,0,0,.45) 100%)}
  #sub.old #flicker{opacity:1}
  /* a fonte de luz tremida vinda de cima */
  #flickerLight{position:absolute;left:0;right:0;top:-10%;height:60%;z-index:5;pointer-events:none;opacity:0;
    background:radial-gradient(ellipse 70% 100% at 50% 0%, rgba(180,150,90,.22) 0%, transparent 65%)}
  #sub.old #flickerLight{opacity:1;animation:flick 4s linear infinite}
  /* NeuroStat: luz fria — o flicker só liga quando o guardião define flickerRate */
  #sub.modern #flickerLight{background:radial-gradient(ellipse 70% 100% at 50% 0%, rgba(120,180,215,.20) 0%, transparent 65%)}
  @keyframes flick{
    0%{opacity:.7}3%{opacity:.15}5%{opacity:.6}7%{opacity:.2}8%{opacity:.75}
    40%{opacity:.7}42%{opacity:.1}43%{opacity:.65}
    70%{opacity:.7}71%{opacity:.25}73%{opacity:.7}74%{opacity:.12}76%{opacity:.7}
    100%{opacity:.7}
  }
  /* tranco de colisão com parede: leve zoom (vista aproxima) + tremor curto —
     bem mais fraco que o jshake da criatura */
  @keyframes wallhit{
    0%{transform:scale(1) translate(0,0)}
    16%{transform:scale(1.016) translate(-2px,1px)}
    38%{transform:scale(1.008) translate(2px,-1px)}
    62%{transform:scale(1.003) translate(-1px,1px)}
    100%{transform:scale(1) translate(0,0)}
  }
  #sub.wallhit{animation:wallhit .38s ease-out}
  @keyframes jshake{
    0%{transform:translate(0,0) rotate(0deg) scale(1)}
    6%{transform:translate(-12px,-7px) rotate(-1.6deg) scale(1.035)}
    14%{transform:translate(13px,8px) rotate(1.5deg) scale(1.03)}
    24%{transform:translate(-11px,-5px) rotate(-1.2deg) scale(1.022)}
    34%{transform:translate(10px,6px) rotate(1.0deg) scale(1.015)}
    46%{transform:translate(-8px,-6px) rotate(-.7deg) scale(1.01)}
    58%{transform:translate(7px,4px) rotate(.5deg) scale(1.006)}
    70%{transform:translate(-6px,4px) rotate(-.35deg) scale(1.003)}
    82%{transform:translate(5px,-3px) rotate(.2deg) scale(1.001)}
    92%{transform:translate(-2px,2px) rotate(-.1deg) scale(1)}
    100%{transform:translate(0,0) rotate(0deg) scale(1)}
  }

  /* blur global da VISÃO (na frente de tudo — casco + visor). Focar reduz. */
  #visionBlur{position:absolute;inset:0;z-index:7;pointer-events:none;backdrop-filter:blur(1.5px)}
  /* bafo no vidro: condensação da RESPIRAÇÃO, concentrada embaixo (altura da boca).
     opacity dirigida pelo ciclo de respiração no draw() — calma quase invisível,
     ofegante embaça de verdade */
  #breathFog{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0;
    background:radial-gradient(ellipse 95% 75% at 50% 80%, rgba(200,220,228,.55), rgba(180,200,210,.20) 55%, transparent 78%)}
  /* rachadura no VIDRO do visor (guardião dispara; desenhada procedural no canvas) */
  #glassCrackCv{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;display:none}
  /* SYSTEM OVERRIDE: fora do visor, no painel de controle */
  #sysOverride{position:absolute;bottom:18vh;left:0;right:0;text-align:center;z-index:9;pointer-events:none;opacity:0;font-size:11px;letter-spacing:.3em;color:#ff2800;text-shadow:0 0 16px rgba(255,40,0,.9)}

  /* HUD */
  #hud{position:absolute;inset:0;z-index:8;pointer-events:none}
  .hud-top{position:absolute;top:2.5vh;left:0;right:0;display:flex;justify-content:center}
  .compass{font-size:12px;letter-spacing:.34em;color:#6a9a9a;text-shadow:0 0 10px rgba(90,180,180,.5)}
  #sub.old .compass{color:#b8923a;text-shadow:0 0 10px rgba(180,140,50,.5)}
  .hud-state{position:absolute;top:2.5vh;right:3vw;font-size:11px;letter-spacing:.2em;color:#4a6a6a}
  #sub.old .hud-state{color:#7a6030}
  .hud-read{position:absolute;bottom:12vh;left:0;right:0;text-align:center;padding:0 12vw}
  .hud-read .line{display:inline-block;font-size:13px;letter-spacing:.06em;color:#9cc;background:rgba(0,10,12,.66);padding:7px 16px;border:1px solid rgba(100,160,160,.3);max-width:80ch;line-height:1.5}

  /* medidor de profundidade, logo acima do painel */
  #depthbox{position:absolute;top:6.2vh;left:50%;transform:translateX(-50%);z-index:8;
    display:flex;align-items:baseline;gap:6px;background:rgba(0,10,12,.6);padding:6px 16px;
    border:1px solid rgba(100,160,160,.3);border-radius:4px;font-variant-numeric:tabular-nums}
  #depthbox .dlabel{font-size:9px;letter-spacing:.24em;color:#5a7a7a}
  #depthbox .dval{font-size:20px;letter-spacing:.1em;color:#9cc;font-weight:600}
  #depthbox .dunit{font-size:11px;color:#5a7a7a}
  #sub.old #depthbox .dval{color:#ca9}
  #sub.old #depthbox .dlabel,#sub.old #depthbox .dunit{color:#7a6030}
  #depthbox.beyond{border-color:rgba(214,90,90,.5)}
  #depthbox.beyond .dval{color:#e88}
  #depthbox.beyond .dlabel{color:#d65a5a}

  #impactbox{position:absolute;top:2.5vh;left:3vw;font-size:10px;letter-spacing:.22em;color:#6a4a4a;pointer-events:none;display:none}
  #impactbox.active{display:block}
  #impactbox.fresh{color:#cc6060;text-shadow:0 0 8px rgba(200,80,80,.6)}
  #sub.old #impactbox{color:#7a5030}
  #sub.old #impactbox.fresh{color:#e09050;text-shadow:0 0 8px rgba(200,130,50,.6)}

  /* flash de colisao com a parede */
  #wallHit{position:absolute;inset:0;z-index:7;pointer-events:none;opacity:0}
  #wallHit.hit{animation:wallflash .4s ease}
  @keyframes wallflash{0%{opacity:0}30%{opacity:1;box-shadow:inset 0 0 12vmin 4vmin rgba(80,15,15,.55)}100%{opacity:0}}

  #ctrls{position:absolute;bottom:3.5vh;left:0;right:0;z-index:9;display:flex;gap:12px;justify-content:center;align-items:center}
  .cbtn{pointer-events:auto;cursor:pointer;background:rgba(8,16,18,.82);border:1px solid rgba(100,150,150,.4);color:#8aaaaa;border-radius:5px;padding:10px 18px;font-family:inherit;font-size:11px;letter-spacing:.16em;transition:all .15s;backdrop-filter:blur(3px)}
  .cbtn:hover{border-color:#7cc;color:#bdd}
  .cbtn:active{transform:scale(.97)}
  .cbtn.active{background:rgba(120,180,180,.2);border-color:#8cc;color:#dee}
  .hint-drag{position:absolute;bottom:9.5vh;left:0;right:0;text-align:center;font-size:9px;letter-spacing:.2em;color:#2e3e3e;z-index:9;pointer-events:none}

  #shutter{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:8;transform:translateY(-110%);transition:transform 1.8s cubic-bezier(0.2,0,0.5,1.0);pointer-events:none}
  #coralFlash{position:absolute;inset:0;background:#000;z-index:9;display:none;opacity:0;pointer-events:none}
  /* tremida calma do submersivel na moonpool (aplicada ao viewport inteiro) */
  #sub.bobbing #viewport{animation:bob 6s ease-in-out infinite}
  @keyframes bob{
    0%{transform:translate(0,0) rotate(0deg)}
    25%{transform:translate(0.4%,0.5%) rotate(0.15deg)}
    50%{transform:translate(-0.3%,0.3%) rotate(-0.12deg)}
    75%{transform:translate(0.2%,-0.4%) rotate(0.1deg)}
    100%{transform:translate(0,0) rotate(0deg)}
  }

  @media (prefers-reduced-motion:reduce){#standby .ring,#sub.bobbing #viewport{animation:none}}
</style>
</head>
<body>

  <div id="standby">
    <div class="ring"></div>
    <div class="msg">SUBMERSIBLE OFFLINE</div>
    <div class="sub">viewport feed inactive</div>
  </div>

  <!-- blackout: fade do GM (z>standby para cobrir tudo quando online) -->
  <div id="blackout" style="position:fixed;inset:0;z-index:58;background:#000;opacity:0;pointer-events:none;transition:opacity 1.5s ease"></div>
  <!-- jflash: flash branco do jumpscare -->
  <div id="jflash" style="position:fixed;inset:0;z-index:59;background:#fff;opacity:0;pointer-events:none;display:none"></div>

  <div id="sub" class="old">
    <!-- janela do visor (posicionada via JS sobre o buraco do casco) -->
    <div id="viewport">
      <canvas id="abyss"></canvas>
      <div id="moonpoolLayer"></div>
      <canvas id="splash"></canvas>
      <div id="glassCurve"></div>
      <div id="glassReflect"></div>
      <div id="viewportVignette"></div>
    <div id="breathFog"></div>
    <canvas id="glassCrackCv"></canvas>
      <img id="shutter" src="img/shutter.png" alt="">
      <div id="coralFlash"></div>
    </div>

    <!-- casco por cima -->
    <img id="hullImg" alt="">

    <!-- escurecimento + luz piscante (casco velho) -->
    <div id="flicker"></div>
    <div id="flickerLight"></div>

    <!-- blur da visão, na frente de tudo -->
    <div id="visionBlur"></div>
    <!-- flash de colisão com parede -->
    <div id="wallHit"></div>

    <div id="hud">
      <div id="impactbox">IMPACTS <span id="impactval">0</span></div>
      <div class="hud-top"><div class="compass" id="compass">BRG 000</div></div>
      <div class="hud-state" id="hudstate">—</div>
      <div class="hud-read" id="hudread"></div>
      <div class="depthbox" id="depthbox">
        <span class="dlabel">DEPTH</span>
        <span class="dval" id="depthval">0000</span>
        <span class="dunit">m</span>
      </div>
    </div>

    <div class="hint-drag" id="hintdrag">WASD pilot · drag look · CTRL light</div>
    <div id="sysOverride">■ SYSTEM OVERRIDE</div>
    <div id="ctrls">
      <div class="cbtn" id="btnLight">LIGHT: OFF</div>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ====== posicao do visor em cada casco (fração da imagem) ======
  // medido das imagens reais
  const HULLS = {
    old_intact:        { src:"img/old_intact.png",        vis:{cx:0.499, cy:0.488, w:0.197, h:0.363} },
    old_cracked:       { src:"img/old_cracked.png",       vis:{cx:0.499, cy:0.488, w:0.197, h:0.363} },
    neurostat:         { src:"img/neurostat.png",          vis:{cx:0.499, cy:0.456, w:0.246, h:0.338} },
    neurostat_cracked: { src:"img/neurostat_cracked.png", vis:{cx:0.500, cy:0.457, w:0.245, h:0.335} }
  };
  const MOONPOOL_SRC = "img/moonpool.png";

  const MY_ID="inv-"+Math.random().toString(36).slice(2,8);
  const ref=sessionRef.child("submarine");
  const presenceRef=ref.child("viewers/"+MY_ID);

  // ===== SPRITES DE PEIXE =====
  // spritesheet 1408×768 = 4 cols × 4 linhas de 352×192px. background verde removido.
  // FISH_FRAMES: sequência de animação [col, row]. Pre-cortados em canvases individuais
  // para eliminar bleeding de bordas — cada canvas tem exatamente 352×192px isolados.
  const FISH_FW=352, FISH_FH=192;
  const FISH_FRAMES=[[0,0],[0,1],[0,2],[0,3],[1,3],[1,0],[1,1],[1,2]];
  let fishFrames=[];   // array de 8 canvases pre-cortados
  let fishEntities={};
  {
    const fimg=new Image();
    fimg.src='img/fish.png';
    fimg.onload=()=>{
      // 1. key out green background no sheet completo
      const oc=document.createElement('canvas');
      oc.width=fimg.width; oc.height=fimg.height;
      const ox=oc.getContext('2d');
      ox.drawImage(fimg,0,0);
      const id=ox.getImageData(0,0,oc.width,oc.height);
      const d=id.data;
      for(let i=0;i<d.length;i+=4){
        const r=d[i],g=d[i+1],b=d[i+2];
        if(g>r*1.6&&g>b*1.3&&g>25) d[i+3]=0;
      }
      ox.putImageData(id,0,0);
      // 2. alpha-trim: detecta bounding box real de cada frame (spritesheet não-uniforme)
      fishFrames = FISH_FRAMES.map(([fc,fr])=>{
        const cx=fc*FISH_FW, cy=fr*FISH_FH;
        const cell=ox.getImageData(cx,cy,FISH_FW,FISH_FH);
        const pd=cell.data;
        let x0=FISH_FW,x1=0,y0=FISH_FH,y1=0;
        // MARGIN: ignora os últimos pixels de cada borda para evitar sangramento do sprite vizinho
        const MARGIN=6;
        for(let y=MARGIN;y<FISH_FH-MARGIN;y++) for(let x=MARGIN;x<FISH_FW-MARGIN;x++){
          if(pd[(y*FISH_FW+x)*4+3]>15){
            if(x<x0)x0=x; if(x>x1)x1=x; if(y<y0)y0=y; if(y>y1)y1=y;
          }
        }
        if(x0>x1){ const e=document.createElement('canvas');e.width=1;e.height=1;return e; }
        const PAD=1;
        x0=Math.max(MARGIN,x0-PAD); y0=Math.max(MARGIN,y0-PAD);
        x1=Math.min(FISH_FW-1-MARGIN,x1+PAD); y1=Math.min(FISH_FH-1-MARGIN,y1+PAD);
        const fw=x1-x0+1, fh=y1-y0+1;
        const cv=document.createElement('canvas'); cv.width=fw; cv.height=fh;
        cv.getContext('2d').drawImage(oc,cx+x0,cy+y0,fw,fh,0,0,fw,fh);
        return cv;
      });
    };
  }

  // ===== SPRITE PEIXE MORTO (criatura grande) =====
  // spritesheet 5×5 = 25 frames. background branco removido.
  const DF_COLS=5, DF_ROWS=5;
  let dfFrames=[];
  {
    const dimg=new Image();
    dimg.src='img/dead_fish.png';
    dimg.onload=()=>{
      const fw=Math.floor(dimg.naturalWidth/DF_COLS), fh=Math.floor(dimg.naturalHeight/DF_ROWS);
      const oc=document.createElement('canvas');
      oc.width=dimg.naturalWidth; oc.height=dimg.naturalHeight;
      const ox=oc.getContext('2d');
      ox.drawImage(dimg,0,0);
      const id=ox.getImageData(0,0,oc.width,oc.height);
      const d=id.data;
      for(let i=0;i<d.length;i+=4){
        if(d[i]>230&&d[i+1]>230&&d[i+2]>230) d[i+3]=0;
      }
      ox.putImageData(id,0,0);
      const INS=6;
      for(let r=0;r<DF_ROWS;r++) for(let c=0;c<DF_COLS;c++){
        const cv=document.createElement('canvas');
        cv.width=fw-INS*2; cv.height=fh-INS*2;
        cv.getContext('2d').drawImage(oc, c*fw+INS, r*fh+INS, fw-INS*2, fh-INS*2, 0,0,cv.width,cv.height);
        dfFrames.push(cv);
      }
      // gera versões espelhadas para rotação Doom (ângulos 181-359°)
      dfFrames.forEach(cv=>{
        const flip=document.createElement('canvas');
        flip.width=cv.width; flip.height=cv.height;
        const fc=flip.getContext('2d');
        fc.translate(cv.width,0); fc.scale(-1,1);
        fc.drawImage(cv,0,0);
        dfFramesFlip.push(flip);
      });
    };
  }

  // ====== CANYON: corredor 2D com paredes reais ======
  // linha central que serpenteia descendo; o submarino navega em (x, depth).
  // ===== MUNDO EM GRID (Wolfenstein/Doom-style) =====
  // Escala: UNITS_PER_M=10 → 10 unidades de mundo = 1 metro. SPEED=30wu/s = 3m/s realistas.
  const UNITS_PER_M=10;
  const MAX_DEPTH=25600, CORAL_DEPTH=6000, START_DEPTH=2000;
  const TILE=40;              // lado de um tile em wu (1 tile = 4 metros)
  const GRID_ROWS=640;        // 640 rows × 40wu = 25600wu = 2560m de profundidade
  // dimensões HORIZONTAIS dinâmicas: o editor de mapa do guardião pode expandir
  let X_MIN_W=-400;           // X mínimo do mundo (col 0)
  let GRID_COLS=21;           // nº de colunas atual
  let COL_OFFSET=0;           // colunas adicionadas à ESQUERDA do grid original
  // MAP[row][col]: 0=água navegável, 1=rocha/parede
  // MUNDO DEFAULT: retângulos de água. O guardião pode EDITAR o mapa: as edições
  // (ops open/close) chegam via Firebase (worldMap) e são aplicadas POR CIMA.
  // col(X=0) = floor((0-(-400))/40) = 10. Corredor central = cols 9-11.
  const DEFAULT_OPEN=[
    [25,29,9,11],     // canal da moonpool (100-116m)
    [30,49,8,12],     // estrutura da estação (120-196m)
    [50,74,8,12],     // canyon de entrada (200-296m)
    [75,124,4,16],    // grande área de bifurcação (300-496m)
    // saída 1: brocas (direita, ~800m)
    [115,130,13,19],[130,160,14,19],[155,200,13,18],[197,207,11,18],
    // saída 2: fenda/caverna (centro-esquerda, ~2364m)
    [125,239,8,12],[240,280,7,15],[280,459,8,12],[460,472,7,13],
    [473,508,9,11],   // a queda (1892-2032m, sentido único)
    [509,589,8,12],[590,632,3,17], // descida pós-queda + caverna do hive-mind
    // saída 3: placeholder esquerda
    [100,130,3,6],[130,180,2,6],[175,192,2,9],[185,225,4,7],
    // saída 4: placeholder direita profunda
    [190,210,14,19],[200,265,17,20],[250,285,13,20],[270,300,15,18]
  ];
  // regiões de CAVERNA default (valor 2): moldura da caverna do hive-mind
  const DEFAULT_CAVE=[[585,639,1,19]];
  function buildMap(ops){
    const m=Array.from({length:GRID_ROWS},()=>new Uint8Array(GRID_COLS).fill(1));
    const paint=(r0,r1,c0,c1,v)=>{
      for(let r=Math.max(0,r0);r<=Math.min(GRID_ROWS-1,r1);r++)
        for(let c=Math.max(0,c0);c<=Math.min(GRID_COLS-1,c1);c++) m[r][c]=v;
    };
    // o default é definido no grid ORIGINAL: desloca por COL_OFFSET quando o
    // mapa foi expandido à esquerda. Ops já vêm no sistema de colunas atual.
    // moldura de CAVERNA (tipo 2) ao redor da caverna do hive-mind, pintada
    // ANTES da água: as paredes remanescentes ali ficam com textura de caverna
    for(const [r0,r1,c0,c1] of DEFAULT_CAVE) paint(r0,r1,c0+COL_OFFSET,c1+COL_OFFSET,2);
    for(const [r0,r1,c0,c1] of DEFAULT_OPEN) paint(r0,r1,c0+COL_OFFSET,c1+COL_OFFSET,0);
    for(const o of (ops||[])) paint(o.r0,o.r1,o.c0,o.c1,o.op==='close'?1:o.op==='cave'?2:0);
    return m;
  }
  let MAP=buildMap([]);

  // Lookup de parede no grid (ponto do mundo → tile)
  // valores: 0=água · 1=rocha do canyon · 2=rocha de CAVERNA (textura própria)
  function tileValueAt(wx,depth){
    const col=Math.floor((wx-X_MIN_W)/TILE);
    const row=Math.floor(depth/TILE);
    if(row<0||row>=GRID_ROWS||col<0||col>=GRID_COLS) return 1;
    return MAP[row][col];
  }
  function isWall(wx,depth){ return tileValueAt(wx,depth)!==0; }

  // ===== ESTRUTURA DA PETROLEIRA (declarativa) =====
  // Laje/parede de fundo da estação logo acima do limite de subida do sub.
  const STATION_TOP=1550;      // topo da laje (155m)
  const MIN_DIVE_DEPTH=1700;   // limite de subida: o sub não passa dos 170m
  let SPAWN={x:0, depth:2450}; // ponto de spawn: definido pelo MAPA (editor do guardião)
  function isStationBackWall(depth){
    return depth>=STATION_TOP && depth<STATION_TOP+100;
  }
  // PILARES: lista declarativa {x, top, bot, r}. O futuro editor de mapa só
  // precisa empurrar mais entradas aqui — render e colisão leem desta lista.
  // Os dois pilares-perna da plataforma nascem na base da laje (1650) e
  // ancoram na encosta a 235m. Sólidos e texturizados do início ao fim.
  const DEFAULT_PILLARS=[
    {x:-36, top:1650, bot:2350, r:22},
    {x: 36, top:1650, bot:2350, r:22},
  ];
  let PILLARS=DEFAULT_PILLARS.slice(); // o editor de mapa pode substituir (worldMap.pillars)
  function pillarAt(px, depth){
    for(let i=0;i<PILLARS.length;i++){
      const P=PILLARS[i];
      if(depth>=P.top && depth<=P.bot && Math.abs(px-P.x)<P.r) return P;
    }
    return null;
  }
  function isPillar(px, depth){ return pillarAt(px,depth)!==null; }
  // hitbox do SUB contra pilares: raio próprio, maior que o das paredes (26)
  const SUB_PILLAR_R=30;
  function pillarBlocked(px,pd){
    const R=SUB_PILLAR_R;
    return !!(pillarAt(px,pd)||pillarAt(px-R,pd)||pillarAt(px+R,pd)||pillarAt(px,pd-R)||pillarAt(px,pd+R));
  }

  // ====== navegação compartilhada ======
  // estado autoritativo: submarine/nav = { x, depth, heading, mode }
  // x = posição lateral no corredor; depth = profundidade; heading = pra onde aponta (0=descer)
  let nav={x:SPAWN.x, depth:SPAWN.depth, heading:0, mode:"moonpool"};
  let navReady=false;
  const keys={};
  let lastWallHit=0, wallHitCount=0, lastWallShake=0;
  // suspensão do veículo: trancos de terreno (mola+amortecedor) enquanto se move
  let shkX=0,shkY=0,shkVX=0,shkVY=0,nextJoltT=0,_shkPX=null,_shkPD=null,_shkPH=null;
  let rollA=0,rollV=0;                 // tombo (graus) — investida da criatura
  let struggleAmt=0,_struggleSyncT=0;  // luta dos players durante o grab (0-100)
  let lastNoiseT=0,lastNoiseX=0,lastNoiseD=0; // batida na parede: "som" que a criatura ouve
  let subSpeedNow=0; // velocidade real do sub (wu/s) — stealth: parado = discreto
  let reelingSpeed=80;
  let grabReelSlow=50; // % de redução do guincho com a criatura agarrada (guardião)
  // ===== CORDA (umbilical): simulação de corda ESTICADA em tempo real =====
  // A corda é SEMPRE uma sequência de segmentos retos: âncora (moonpool) →
  // quinas de parede onde ela DOBRA (wrap) → sub. Quando o sub se move e o
  // segmento desdobra (o pivô anterior volta a ver o sub), o pivô some (unwrap).
  // Margem fina (6wu — corda, não submarino): sem cantos fantasmas.
  let ropePivots=[], ropeSyncT=0;
  let ropeState='slack';        // 'slack' = paga/largada no leito · 'taut' = tensionada
  let slackPath=[], _slackLast=null; // trajeto real percorrido (a corda frouxa deita nele)
  const ROPE_MARGIN=6;
  function ropeAnchor(){ return {x:SPAWN.x, depth:1000}; }
  function ropeLOS(x1,d1,x2,d2,margin){
    const M=margin||ROPE_MARGIN;
    const dist=Math.hypot(x2-x1,d2-d1);
    if(dist<1) return true;
    const steps=Math.max(2,Math.ceil(dist/(TILE*0.30)));
    const nx=-(d2-d1)/dist*M, nd=(x2-x1)/dist*M;
    for(let i=1;i<steps;i++){
      const t=i/steps;
      const cx=x1+(x2-x1)*t, cd=d1+(d2-d1)*t;
      if(isWall(cx,cd)||isWall(cx+nx,cd+nd)||isWall(cx-nx,cd-nd)) return false;
    }
    return true;
  }
  // acha a QUINA onde a corda dobra: marcha fina do pivô ao sub até bater na
  // parede; candidatos = os 4 cantos do tile atingido (com folga diagonal);
  // vence o canto visível pelo pivô mais próximo da linha da corda
  function ropeFindCorner(px,pd){
    const dx=nav.x-px, dd=nav.depth-pd;
    const L=Math.hypot(dx,dd); if(L<2) return null;
    const ux=dx/L, ud=dd/L;
    let hx=0, hd=0, hit=false;
    for(let s=2;s<L;s+=2){
      const cx=px+ux*s, cd=pd+ud*s;
      if(isWall(cx,cd)){ hx=cx; hd=cd; hit=true; break; }
    }
    if(!hit) return null;
    const tc=Math.floor((hx-X_MIN_W)/TILE), tr=Math.floor(hd/TILE);
    const OF=9, cands=[];
    for(const [qx0,qd0,sx,sd] of [
      [X_MIN_W+tc*TILE,     tr*TILE,     -1,-1],
      [X_MIN_W+(tc+1)*TILE, tr*TILE,      1,-1],
      [X_MIN_W+tc*TILE,     (tr+1)*TILE, -1, 1],
      [X_MIN_W+(tc+1)*TILE, (tr+1)*TILE,  1, 1],
    ]){
      const qx=qx0+sx*OF, qd=qd0+sd*OF;
      if(isWall(qx,qd)) continue;
      if(!ropeLOS(px,pd,qx,qd)) continue;
      const t=(qx-px)*ux+(qd-pd)*ud;
      const lx=px+ux*t, ld=pd+ud*t;
      cands.push({x:qx,depth:qd,score:Math.hypot(qx-lx,qd-ld)});
    }
    if(!cands.length) return null;
    cands.sort((a,b)=>a.score-b.score);
    // pula candidato colado no pivô atual (evita travar repetindo a mesma quina)
    for(const cd2 of cands){
      if(Math.hypot(cd2.x-px,cd2.depth-pd)>=6) return {x:cd2.x,depth:cd2.depth};
    }
    return null;
  }
  function ropeUpdate(){
    if(!ropePivots.length) ropePivots=[ropeAnchor()];
    // UNWRAP: enquanto o penúltimo pivô vê o sub, o último desdobra
    let g1=0;
    while(ropePivots.length>1&&g1++<10){
      const prev=ropePivots[ropePivots.length-2];
      if(ropeLOS(prev.x,prev.depth,nav.x,nav.depth)) ropePivots.pop();
      else break;
    }
    // WRAP: o último pivô não vê o sub → a corda dobra em quinas novas.
    // Numa parede reta em ângulo raso ela deita em vários pivôs colineares
    // (como corda de verdade) — o guard alto deixa convergir no mesmo frame.
    let g2=0;
    while(g2++<10&&ropePivots.length<48){
      const last=ropePivots[ropePivots.length-1];
      if(ropeLOS(last.x,last.depth,nav.x,nav.depth)) break;
      const corner=ropeFindCorner(last.x,last.depth);
      if(!corner) break;
      ropePivots.push(corner);
    }
  }
  // sync do estado da corda pro guardião/monitor: {state, pts}
  function ropeSync(){
    const nw=performance.now();
    if(nw-ropeSyncT<700) return;
    ropeSyncT=nw;
    let pts;
    if(ropeState==='taut'){
      pts=ropePivots.concat([{x:Math.round(nav.x),depth:Math.round(nav.depth)}]);
    } else {
      // slack: trajeto percorrido, decimado se longo
      const step=slackPath.length>240?Math.ceil(slackPath.length/240):1;
      pts=[ropeAnchor()];
      for(let i=0;i<slackPath.length;i+=step) pts.push(slackPath[i]);
      pts.push({x:Math.round(nav.x),depth:Math.round(nav.depth)});
    }
    ref.child("rope").set({state:ropeState,pts});
  }
  // corda PAGA: registra o trajeto (a frouxa deita no caminho real percorrido)
  function slackFeed(){
    if(!_slackLast){ _slackLast={x:nav.x,depth:nav.depth}; return; }
    if(Math.hypot(nav.x-_slackLast.x,nav.depth-_slackLast.depth)>30){
      slackPath.push({x:Math.round(nav.x),depth:Math.round(nav.depth)});
      _slackLast={x:nav.x,depth:nav.depth};
      if(slackPath.length>900) slackPath.splice(0,slackPath.length-900);
    }
  }
  // TENSIONAR: o guincho puxa — a frouxa vira esticada. Replay do trajeto real
  // pela simulação de quinas: os pivôs finais são as quinas onde a corda
  // tensionada de fato dobra (contorna cantos sem prender).
  function tautenRope(){
    ropePivots=[ropeAnchor()];
    const saveX=nav.x, saveD=nav.depth;
    for(const p of slackPath){
      nav.x=p.x; nav.depth=p.depth;
      ropeUpdate();
    }
    nav.x=saveX; nav.depth=saveD;
    ropeUpdate();
    ropeState='taut';
    ropeSyncT=0; ropeSync();
  }
  // ponto de PUXÃO: o mais distante ao longo da corda alcançável em linha reta
  // com FOLGA DE SUBMARINO (26wu) — corta a curva por dentro, nunca prende na quina
  function reelTarget(){
    // folga 34wu (> hitbox 26): o caminho puxado passa LONGE das quinas
    for(let i=0;i<ropePivots.length;i++){
      const p=ropePivots[i];
      if(ropeLOS(nav.x,nav.depth,p.x,p.depth,34)) return p;
    }
    // sem linha folgada: mira o pivô mais próximo mesmo (o steering desvia)
    return ropePivots[ropePivots.length-1]||ropeAnchor();
  }

  let heading=0, lightMode=false, lightOn=false;
  let beamX=0.5, beamY=0.5;
  // RESPIRAÇÃO: embaça o vidro no ritmo do fôlego do piloto.
  // recentHits sobe com dano (jumpscare/colisão/investida) e decai em ~20s —
  // machucado = ofegante = vidro mais embaçado, mais vezes por minuto.
  let breathPhase=0, recentHits=0;
  let STATE={};
  let imgEl=null, imgReady=false;
  let curHull=null;
  let coralActive=false, shutterClosed=false, shutterOverride="auto";
  let moonScroll=0; // 0 = na superficie (moonpool visivel), 1 = submerso

  const cv=document.getElementById("abyss"), x=cv.getContext("2d");
  const elViewport=document.getElementById("viewport");
  const elHull=document.getElementById("hullImg");
  const elMoon=document.getElementById("moonpoolLayer");
  let VPW=0,VPH=0,DPR=1;

  // posiciona a janela do visor sobre o buraco do casco atual
  function layoutViewport(){
    if(!curHull) return;
    const vis=HULLS[curHull].vis;
    // o casco é object-fit:cover na tela toda. Precisamos saber como ele foi escalado.
    const iw=elHull.naturalWidth||1400, ih=elHull.naturalHeight||800;
    const sw=window.innerWidth, sh=window.innerHeight;
    const scale=Math.max(sw/iw, sh/ih); // cover
    const dw=iw*scale, dh=ih*scale;
    const ox=(sw-dw)/2, oy=(sh-dh)/2; // offset do cover (centralizado)
    // posicao do visor em px na tela
    const vx=ox + vis.cx*dw, vy=oy + vis.cy*dh;
    const vw=vis.w*dw, vh=vis.h*dh;
    elViewport.style.left=(vx-vw/2)+"px";
    elViewport.style.top=(vy-vh/2)+"px";
    elViewport.style.width=vw+"px";
    elViewport.style.height=vh+"px";
    // canvas na resolucao do visor
    DPR=Math.min(window.devicePixelRatio||1,2);
    VPW=vw; VPH=vh;
    cv.width=vw*DPR; cv.height=vh*DPR;
    cv.style.width=vw+"px"; cv.style.height=vh+"px";
    x.setTransform(DPR,0,0,DPR,0,0);
    // moonpool layer: alta o suficiente pra rolar
    elMoon.style.height=(vh*2.2)+"px";
    elMoon.style.backgroundImage=`url(${MOONPOOL_SRC})`;
  }
  window.addEventListener("resize",layoutViewport);

  // ===== MANCHAS DE FUNDO =====
  // silhuetas grandes e borradas que derivam atrás das paredes (acima da linha do horizonte)
  const _BLOBS = Array.from({length: 24}, (_,i) => {
    const r = n => Math.abs(Math.sin(i*13.7+n)*0.5+Math.sin(i*7.3+n*2.1)*0.5);
    return {
      angle: r(1)*Math.PI*2,          // ângulo no mundo (rad)
      dist:  120 + r(2)*550,           // distância pseudo (wu) — afeta tamanho
      sizeW: 50  + r(3)*200,           // largura base (wu) — manchas longas
      sizeH: 5   + r(4)*18,            // altura base (wu)
      speed: (r(5)-0.5)*0.012,         // deriva angular (rad/s) — lentas
      yFrac: 0.04 + r(6)*0.56,         // posição vertical no céu (0=topo,1=horizonte)
      alpha: 0.022 + r(7)*0.055,       // opacidade base
      blur:  2.5 + r(8)*5,             // raio de blur
    };
  });
  let _blobsLastT = null;
  function drawBlobs(w, h, heading, ambLight, beyond){
    const FOV=Math.PI*78/180, halfFov=FOV/2;
    const now=performance.now()/1000;
    const dt=_blobsLastT!==null ? Math.min(0.1,now-_blobsLastT) : 0;
    _blobsLastT=now;
    x.save();
    for(const b of _BLOBS){
      b.angle += b.speed*dt;
      let rel=b.angle - heading*Math.PI/180;
      while(rel>Math.PI) rel-=Math.PI*2;
      while(rel<-Math.PI) rel+=Math.PI*2;
      if(Math.abs(rel)>halfFov*1.35) continue;
      const scale=110/b.dist;
      const screenX=w/2+(rel/halfFov)*(w/2);
      const blobW=Math.max(6, (Math.atan2(b.sizeW*scale,2)/halfFov)*w);
      const blobH=Math.max(1.5, b.sizeH*scale*(h*0.007));
      const screenY=h*0.5*b.yFrac;
      const alpha=b.alpha*Math.min(1.8,scale)*(0.25+ambLight*0.75);
      if(alpha<0.004) continue;
      const blurPx=Math.max(1.2,(b.blur*(0.4+scale))).toFixed(1);
      x.filter=`blur(${blurPx}px)`;
      x.globalAlpha=alpha;
      x.fillStyle=beyond?'#04100c':'#050f15';
      x.beginPath();x.ellipse(screenX,screenY,blobW/2,blobH/2,0,0,Math.PI*2);x.fill();
    }
    x.filter='none'; x.globalAlpha=1; x.restore();
  }

  // particulas
  // partículas suspensas "na cena": sx,sy = posição base na tela (0..1); pz = profundidade
  // na cena (0 longe .. 1 perto). o movimento do sub as translada (ver drawParticles).
  // neve marinha em ESPAÇO DE MUNDO: cada mote tem posição fixa no mapa e é
  // projetada com a MESMA câmera dos sprites — passa, cresce e some com
  // perspectiva real conforme o sub se move (qualquer eixo, grab incluído)
  const motes=[];
  for(let i=0;i<80;i++){
    const big=Math.random()<0.25;
    motes.push({
      wx:0, wd:-1, // wd<0 = ainda não posicionada (respawn na 1ª frame)
      oy:(Math.random()-0.5)*1.7,
      r:big?(1.5+Math.random()*1.2):(0.6+Math.random()*0.8),
      soft:big,
      a:big?(0.10+Math.random()*0.08):(0.14+Math.random()*0.16),
      ph:Math.random()*6.28
    });
  }
  function moteRespawn(m,ahead){
    const hdgR=nav.heading*Math.PI/180;
    const fwd=ahead?(30+Math.random()*150):(5+Math.random()*185);
    const lat=(Math.random()-0.5)*260;
    m.wx=nav.x+Math.sin(hdgR)*fwd+Math.cos(hdgR)*lat;
    m.wd=nav.depth+Math.cos(hdgR)*fwd-Math.sin(hdgR)*lat;
    m.oy=(Math.random()-0.5)*1.7;
  }
  // PLÂNCTON: partículas suspensas FIXAS no espaço do mundo (x lateral, profundidade, altura).
  // só ficam visíveis onde a lanterna ilumina — como sujeira/plâncton brilhando no facho.
  // distribuídas num volume ao redor do submarino; recicladas quando ficam pra trás.
  const plankton=[];
  for(let i=0;i<260;i++)plankton.push({
    ox:(Math.random()-0.5)*220,        // deslocamento lateral em relação ao sub (mundo)
    od:Math.random()*180+10,           // distância à frente (profundidade relativa)
    oy:(Math.random()-0.5)*1.6,        // altura (-1 teto .. +1 chão), 0 = linha do olho
    r:Math.random()*1.6+0.4,
    ph:Math.random()*6.28
  });

  // move e desenha as partículas suspensas conforme o movimento REAL do submarino.
  // eixos: depth = vertical do mundo (descer faz partículas DESCEREM na tela e vice-versa);
  // avanço no plano + giro = deslizamento horizontal. movimento leve, não dominam a tela.
  function drawParticles(w,h,depth){
    const hdgR=nav.heading*Math.PI/180;
    const dirX=Math.sin(hdgR), dirY=Math.cos(hdgR);
    const invDet=1.0/Math.tan(Math.PI*78/360);
    // luz ambiente encolhe alpha no fundo; visível SEM lanterna, brilha mais sob o facho
    const dn_=Math.max(0,Math.min(1,(depth-START_DEPTH)/(MAX_DEPTH-START_DEPTH)));
    const pAmb=0.40+(1-dn_*0.8)*0.60;
    const bxw=beamX*w, byh=beamY*h, litR=Math.min(w,h)*0.6;
    for(const m of motes){
      if(m.wd<0) moteRespawn(m,false); // primeira frame: espalha por todo o range
      // deriva própria: afunda devagar + vagueia lateralmente no mundo
      m.oy+=0.0006+Math.sin(t*0.011+m.ph)*0.0002;
      if(m.oy>0.95) m.oy=-0.95;
      m.wx+=Math.sin(t*0.009+m.ph*2.3)*0.03;
      const {tX,tY}=billboardTransform(m.wx,m.wd,hdgR,invDet,dirX,dirY);
      if(tY<=3||tY>200){ moteRespawn(m,true); continue; }
      const sx2=w/2*(1+tX/tY);
      if(sx2<-30||sx2>w+30){ moteRespawn(m,true); continue; }
      const scale=Math.min(2.6,40/tY);
      const py=h/2+m.oy*(h*0.42)*scale;
      if(py<-20||py>h+20) continue;
      // fade PERTO da tela (sem bolhas gigantes) + fade na distância
      const nearFade=Math.max(0,Math.min(1,(tY-4)/9));
      const farFade=Math.max(0,1-tY/190);
      let lit=0;
      if(lightOn){ const db=Math.hypot(sx2-bxw,py-byh); lit=Math.max(0,1-db/litR); }
      const tw=0.6+0.4*Math.sin(t*0.045+m.ph*3);
      const alpha=(m.a*pAmb+lit*lit*0.30)*tw*nearFade*farFade;
      if(alpha<0.012) continue;
      const sz=Math.max(0.4,m.r*scale);
      x.globalAlpha=Math.min(0.5,alpha);
      if(m.soft){
        x.fillStyle="rgba(175,205,215,.45)";
        x.beginPath();x.arc(sx2,py,sz*1.9,0,6.28);x.fill();
        x.fillStyle="rgba(205,228,235,.9)";
        x.beginPath();x.arc(sx2,py,sz*0.75,0,6.28);x.fill();
      } else {
        x.fillStyle="rgba(195,218,225,.9)";
        x.beginPath();x.arc(sx2,py,sz*0.6,0,6.28);x.fill();
      }
    }
    x.globalAlpha=1;
  }

  // ===== SPRITES BILLBOARD (Doom-style, fórmula lodev) =====
  // Seleção de frame por ÂNGULO câmera→sprite (Doom rotation), não por tempo.
  // Cada peixe tem parâmetros de movimento derivados de fishPhase → variação individual.
  function billboardTransform(wx, wd, hdg, invDet, dirX_, dirY_){
    const rx=wx-nav.x, rd=wd-nav.depth;
    const tX=invDet*(dirY_*rx - dirX_*rd);
    const tY=dirX_*rx + dirY_*rd;
    return {tX, tY, rx, rd};
  }
  function billboardDraw(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_, screenX, tY, projH, projW, fCanvas, alpha=1, yTopO=null){
    const y0=yTopO!==null?yTopO:h/2-projH/2;
    const x0=screenX-projW/2, x1=screenX+projW/2;
    if(x1<0||x0>w) return;
    const fog=Math.max(0,Math.min(1,1-tY/(VIS_WALL_*0.9)));
    if(fog<0.05) return;
    const fw=fCanvas.width, fh=fCanvas.height;
    x.save(); x.globalAlpha=Math.min(0.92,fog)*alpha;
    const sx0=Math.max(0,Math.floor(x0)), sx1=Math.min(w-1,Math.ceil(x1));
    let seg=-1;
    const flush=(end)=>{
      if(seg<0) return;
      x.save(); x.beginPath(); x.rect(seg,y0,end-seg,projH); x.clip();
      x.drawImage(fCanvas,0,0,fw,fh,x0,y0,projW,projH);
      x.restore(); seg=-1;
    };
    for(let sx=sx0;sx<=sx1;sx++){
      const col=Math.min(COLS_-1,Math.floor(sx/colW_));
      if(tY<zBuf[col]){ if(seg<0) seg=sx; } else flush(sx);
    }
    flush(sx1+1); x.restore();
  }
  function drawFishSprites(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_){
    if(!fishFrames.length) return;
    const ents=Object.values(fishEntities).filter(e=>e&&e.visible!==false);
    if(!ents.length) return;
    const now=t*0.016;
    const hdg=nav.heading*Math.PI/180;
    const dirX=Math.sin(hdg), dirY=Math.cos(hdg);
    const invDet=1.0/Math.tan(Math.PI*78/360);

    ents.sort((a,b)=>Math.hypot((b.wx||0)-nav.x,(b.wd||0)-nav.depth)-Math.hypot((a.wx||0)-nav.x,(a.wd||0)-nav.depth));

    for(const ent of ents){
      // parâmetros individuais derivados de fishPhase (deterministicamente "aleatórios" por peixe)
      const fp=ent.fishPhase||0;
      const swimSpeed=0.35 + (Math.sin(fp*7.3)*0.5+0.5)*0.65;  // 0.35..1.0 rad/s
      const swimAmp  =18  + (Math.sin(fp*3.7)*0.5+0.5)*32;     // 18..50wu
      const depthDrift=    (Math.sin(fp*5.1)*0.5+0.5)*40;      // deriva lenta em profundidade
      const driftSpeed=0.08+(Math.sin(fp*11)*0.5+0.5)*0.12;    // 0.08..0.2 rad/s

      const phase=now*swimSpeed+fp;
      const glideX=Math.sin(phase)*swimAmp;
      const glideVel=Math.cos(phase); // >0 = movendo +X
      const depthOffset=Math.sin(now*driftSpeed+fp*2)*depthDrift;

      const fishX=(ent.wx||0)+glideX;
      const fishD=(ent.wd||nav.depth)+depthOffset;

      const {tX,tY}=billboardTransform(fishX,fishD,hdg,invDet,dirX,dirY);
      if(tY<=0.5) continue;

      const screenX=w/2*(1+tX/tY);
      const projH=Math.min(h*0.65, WALLH_*0.28/tY);
      const projW=projH*(fishFrames[0].width/fishFrames[0].height);

      // Doom rotation: ângulo da câmera em relação à direção de nado do peixe
      // fishHeading: 90° (+X) quando glideVel>0, 270° (-X) quando <0
      const fishHdgRad = glideVel>=0 ? Math.PI/2 : -Math.PI/2;
      const viewAngle=Math.atan2(nav.x-fishX, nav.depth-fishD); // ângulo fish→player no espaço mundo
      const relAngle=((viewAngle-fishHdgRad)*(180/Math.PI)+720)%360;
      const fIdx=Math.round(relAngle/45)%8;

      const fishBR=Math.min(w,h)*0.62;
      const fishLit=lightOn?Math.max(0,1-Math.hypot(screenX-beamX*w,h*0.5-beamY*h)/fishBR):0;
      const fishAmb=Math.max(0.05,1-Math.max(0,Math.min(1,(nav.depth-START_DEPTH)/(MAX_DEPTH-START_DEPTH)))*0.8);
      const fishAlpha=Math.min(1,fishAmb*0.65+fishLit*0.4);
      billboardDraw(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_,screenX,tY,projH,projW,fishFrames[fIdx],fishAlpha);
    }
  }

  // ===== CRIATURA (billboard procedural — sprite real enviado depois) =====
  let creatureEntities={};
  // ===== DOOM SPRITE ROTATION (5 linhas = 5 ângulos, espelhado para 360°) =====
  // Linha 0 = de frente (face-on), linha 2 = de lado (90°), linha 4 = de costas.
  // viewAngle = atan2(sub.x - ent.wx, sub.depth - ent.wd) = direção ent→câmera.
  // relDeg = (viewAngle - ent._facing + 360) % 360. Se relDeg>180 → usa frame espelhado.
  function drawCreatureSprites(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_){
    const ents=Object.entries(creatureEntities).filter(([,e])=>e&&e.visible!==false);
    if(!ents.length) return;
    const hdg=nav.heading*Math.PI/180;
    const dirX=Math.sin(hdg), dirY=Math.cos(hdg);
    const invDet=1.0/Math.tan(Math.PI*78/360);

    ents.sort(([,a],[,b])=>Math.hypot((b.wx||0)-nav.x,(b.wd||0)-nav.depth)-Math.hypot((a.wx||0)-nav.x,(a.wd||0)-nav.depth));

    for(const [id,ent] of ents){
      // criatura agarrada é renderizada como overlay em drawGrabOverlay — ignorar aqui
      if(grabbedBy===id) continue;

      const {tX,tY}=billboardTransform(ent.wx||0,ent.wd||nav.depth,hdg,invDet,dirX,dirY);
      if(tY<=0.5) continue;
      const screenX=w/2*(1+tX/tY);

      // BIOLUMINESCÊNCIA: ponto de luz que aparece antes da forma (SOMA approach)
      // visível até 500wu de distância, pulsa lentamente
      const biolumPhase=(id.charCodeAt(0)*1.37)%(Math.PI*2);
      const biolumPulse=0.35+0.65*Math.abs(Math.sin(t*0.038+biolumPhase));
      // alcance maior que os pontos ambientes (ela anuncia de longe) + oclusão SUAVE:
      // fade temporal em vez de sumir num frame (o pop denunciava que era a criatura)
      const gcol=Math.max(0,Math.min(COLS_-1,Math.floor(screenX/colW_)));
      const occluded=tY>=zBuf[gcol]+12;
      const gv=(creatureGlowVis[id]===undefined?1:creatureGlowVis[id]);
      creatureGlowVis[id]=gv+((occluded?0:1)-gv)*0.09;
      const glowAlpha=Math.max(0,(1-tY/850)*biolumPulse*0.82)*creatureGlowVis[id];
      if(glowAlpha>0.01){
        // verde IGUAL à bioluminescência ambiente — a criatura se disfarça entre elas
        const glowR=Math.min(h*0.20,110/Math.max(1,tY*0.08));
        const gr2=x.createRadialGradient(screenX,h/2,0,screenX,h/2,glowR*3.8);
        gr2.addColorStop(0,`rgba(90,255,155,${(glowAlpha*0.65).toFixed(3)})`);
        gr2.addColorStop(0.35,`rgba(35,190,90,${(glowAlpha*0.18).toFixed(3)})`);
        gr2.addColorStop(1,'transparent');
        x.save(); x.fillStyle=gr2; x.beginPath(); x.arc(screenX,h/2,glowR*3.8,0,6.28); x.fill(); x.restore();
      }

      const fog=Math.max(0,Math.min(1,1-tY/(VIS_WALL_*0.9)));
      if(fog<0.02) continue;

      if(dfFrames.length){
        // ILUMINAÇÃO 3 CAMADAS (SOMA): distância + biolum + lanterna
        const cAmb=Math.max(0.05,1-Math.max(0,Math.min(1,(nav.depth-START_DEPTH)/(MAX_DEPTH-START_DEPTH)))*0.8);
        const distVis=Math.max(0,Math.min(1,(250-tY)/100)); // 1 se perto, 0 se longe
        const cBR_=Math.min(w,h)*0.60;
        const cLit=lightOn?Math.max(0,1-Math.hypot(screenX-beamX*w,h*0.5-beamY*h)/cBR_):0;
        const lightFactor=Math.min(1, cAmb*0.07 + distVis*0.72 + cLit*cLit*0.92);

        // rotação Doom — o facing vem da IA (que só encara quando VÊ o sub;
        // cega/procurando olha pra onde anda). O render não força nada.
        const viewAngle=Math.atan2(nav.x-(ent.wx||0), nav.depth-(ent.wd||nav.depth));
        const facing=(ent._facing!==undefined)?ent._facing:viewAngle;
        let relDeg=((viewAngle-facing)*180/Math.PI+360)%360;
        const flipX=relDeg>180;
        if(flipX) relDeg=360-relDeg;
        const rotRow=4-Math.min(4,Math.round(relDeg/45));
        const PING=(DF_COLS-1)*2;
        const fi=(t*0.055)%PING;
        const fi0=Math.floor(fi), fi1=(fi0+1)%PING;
        const blend=fi-fi0;
        const frames=flipX?dfFramesFlip:dfFrames;
        const animCol0=fi0<DF_COLS?fi0:PING-fi0;
        const animCol1=fi1<DF_COLS?fi1:PING-fi1;
        const frame0=frames[Math.min(frames.length-1,rotRow*DF_COLS+animCol0)];
        const frame1=frames[Math.min(frames.length-1,rotRow*DF_COLS+animCol1)];
        const projH=Math.min(h*3.5,WALLH_*3.2/tY);
        const projW=projH*(frame0.width/frame0.height);
        billboardDraw(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_,screenX,tY,projH,projW,frame0,lightFactor*(1-blend));
        if(blend>0.02) billboardDraw(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_,screenX,tY,projH,projW,frame1,lightFactor*blend);
      } else {
        // fallback procedural
        const projH=Math.min(h*1.2, WALLH_*0.7/tY);
        const projW=projH*0.7;
        const centerCol=Math.min(COLS_-1,Math.floor(screenX/colW_));
        if(tY>=zBuf[centerCol]) continue;
        const pulse=0.55+0.45*Math.sin(t*0.07);
        const cx=screenX, cy=h/2;
        const gr=x.createRadialGradient(cx,cy,projH*0.05,cx,cy,projH*0.5);
        gr.addColorStop(0,`rgba(255,60,0,${0.85*fog})`);
        gr.addColorStop(0.45,`rgba(160,10,0,${0.5*fog})`);
        gr.addColorStop(1,`rgba(80,0,0,0)`);
        x.save(); x.globalAlpha=fog;
        x.fillStyle=gr;
        x.beginPath(); x.ellipse(cx,cy,projW*0.5,projH*0.5,0,0,Math.PI*2); x.fill();
        x.restore();
      }
    }
  }

  // pontos de bioluminescência ambiente: organismos fixos no canyon abaixo do coral
  const BIOLUM_PTS=(()=>{
    const pts=[]; let s=23;
    const rng=()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; };
    for(let i=0;i<60;i++){
      pts.push({wx:(rng()-0.5)*320, wd:CORAL_DEPTH+rng()*(MAX_DEPTH*0.62-CORAL_DEPTH), ph:rng()*6.28, spd:0.016+rng()*0.014});
    }
    return pts;
  })();

  // ===== TEXTURAS TILEÁVEIS (canvas + ImageData) =====
  // Arquitetura pronta pra spritesheet: pra usar arte real no futuro, basta desenhar
  // o PNG num canvas 256×256 e substituir {cnv, px} — o pipeline de render é idêntico.
  const TEX_SIZE=256, TEX_MASK=255, TEX_SHIFT=8;
  function makeTexture(kind){
    const cnv=document.createElement('canvas'); cnv.width=cnv.height=TEX_SIZE;
    const c2=cnv.getContext('2d');
    const img=c2.createImageData(TEX_SIZE,TEX_SIZE);
    const px=new Uint32Array(img.data.buffer);
    // value noise tileável: lattice com índices modulares
    const L=32, lat=new Float32Array(L*L);
    let seed=kind==='wall'?7:kind==='floor'?13:29;
    const rng=()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/4294967296; };
    for(let i=0;i<L*L;i++) lat[i]=rng();
    function vnoise(u,v,cells){
      const gu=u*cells, gv=v*cells;
      const iu=Math.floor(gu), iv=Math.floor(gv);
      const fu=gu-iu, fv=gv-iv;
      const su=fu*fu*(3-2*fu), sv=fv*fv*(3-2*fv);
      const i0=iu%cells, i1=(iu+1)%cells, j0=iv%cells, j1=(iv+1)%cells;
      const a=lat[j0*L+i0], b=lat[j0*L+i1], c=lat[j1*L+i0], d=lat[j1*L+i1];
      const top=a+(b-a)*su;
      return top+((c+(d-c)*su)-top)*sv;
    }
    for(let y=0;y<TEX_SIZE;y++){
      const v=y/TEX_SIZE;
      for(let xx=0;xx<TEX_SIZE;xx++){
        const u=xx/TEX_SIZE;
        const n=vnoise(u,v,8)*0.55+vnoise(u,v,16)*0.28+vnoise(u,v,32)*0.17;
        let lum;
        if(kind==='wall'){
          // estratos horizontais + fraturas escuras
          const strata=0.78+0.22*Math.sin(v*6.28*3.0+n*4.0);
          const crack=vnoise((u*4)%1,v,16)>0.82?0.55:1.0;
          lum=(52+n*150)*strata*crack;
        } else if(kind==='floor'){
          // leito ROCHOSO: fraturas escuras + manchas — mesmo caráter das paredes
          const crackF=vnoise((u*3)%1,(v*3)%1,16)>0.78?0.52:1.0;
          const patch=0.70+0.30*vnoise(u,v,8);
          lum=(34+n*118)*crackF*patch;
        } else if(kind==='cave'){
          // caverna: blocos musgosos + gotejamento vertical
          const drip=0.80+0.20*Math.sin(u*6.28*7+n*3);
          const moss=vnoise((u*2)%1,(v*2)%1,16)>0.70?1.18:1.0;
          lum=(40+n*120)*drip*moss;
        } else {
          // pilar: AÇO — painéis verticais, linhas de solda horizontais, riscos claros
          const rib=0.80+0.20*Math.abs(Math.sin(u*6.28*6));
          const seam=(y&63)<3?0.55:1.0;
          const scratch=vnoise((u*8)%1,v,32)>0.86?1.30:1.0;
          lum=(112+n*58)*rib*seam*scratch;
        }
        lum=Math.max(14,Math.min(235,lum));
        // tints: pilar frio metálico; caverna esverdeada; rocha quase neutra
        const cRk=kind==='pillar'?0.90:kind==='cave'?0.88:1.00;
        const cGk=kind==='pillar'?0.97:kind==='cave'?1.00:0.96;
        const cBk=kind==='pillar'?1.06:kind==='cave'?0.86:0.90;
        px[y*TEX_SIZE+xx]=(255<<24)|(((lum*cBk)|0)<<16)|(((lum*cGk)|0)<<8)|((lum*cRk)|0);
      }
    }
    c2.putImageData(img,0,0);
    return {cnv, px, w:TEX_SIZE, h:TEX_SIZE};
  }
  // ===== DOIS SETS: IMAGENS (PNGs reais, default) e PROCEDURAIS (fallback/opção) =====
  // O guardião troca ao vivo via Firebase (texMode). Imagem que falhar ao carregar
  // cai no procedural. Variantes: escolha determinística por posição no mundo
  // (mesmo lugar = mesma variante sempre, sem flicker).
  const TEXSETS={
    proc:{
      wall:[makeTexture('wall')],
      floor:[makeTexture('floor')],
      pillar:[makeTexture('pillar')],
      cave:[makeTexture('cave')]
    },
    img:{ wall:[], floor:[], pillar:[], cave:[] }
  };
  let texMode='img';
  const TEXR={wall:TEXSETS.proc.wall,floor:TEXSETS.proc.floor,pillar:TEXSETS.proc.pillar,cave:TEXSETS.proc.cave};
  function rebuildTexR(){
    for(const k of ['wall','floor','pillar','cave']){
      const arr=(TEXSETS[texMode][k]||[]).filter(Boolean);
      TEXR[k]=arr.length?arr:TEXSETS.proc[k];
    }
  }
  const TEX_FILES={
    wall:['img/tex_canyon.png'],
    pillar:['img/tex_pillar_0.png','img/tex_pillar_1.png','img/tex_pillar_2.png'],
    floor:['img/tex_floor_0.png','img/tex_floor_1.png','img/tex_floor_2.png','img/tex_floor_3.png'],
    cave:['img/tex_cave_0.png','img/tex_cave_1.png','img/tex_cave_2.png']
  };
  Object.entries(TEX_FILES).forEach(([kind,files])=>{
    files.forEach((src,i)=>{
      const im=new Image();
      im.onload=()=>{
        const cnv=document.createElement('canvas'); cnv.width=cnv.height=TEX_SIZE;
        const c2=cnv.getContext('2d');
        c2.drawImage(im,0,0,TEX_SIZE,TEX_SIZE);
        const imgd=c2.getImageData(0,0,TEX_SIZE,TEX_SIZE);
        if(kind==='pillar'){
          // concreto mais BRANCO: gain + lift — destaca da rocha em volta
          const d=imgd.data;
          for(let p=0;p<d.length;p+=4){
            d[p]=Math.min(255,d[p]*1.32+10);
            d[p+1]=Math.min(255,d[p+1]*1.32+10);
            d[p+2]=Math.min(255,d[p+2]*1.32+10);
          }
          c2.putImageData(imgd,0,0);
        }
        const px=new Uint32Array(imgd.data.buffer);
        TEXSETS.img[kind][i]={cnv,px,w:TEX_SIZE,h:TEX_SIZE};
        rebuildTexR();
      };
      im.src=src;
    });
  });
  // variante determinística por posição (hash de coordenadas de bloco)
  function texVar(arr,a,b){
    if(arr.length===1) return arr[0];
    let h=((a|0)*73856093)^((b|0)*19349663); h=(h^(h>>>13))>>>0;
    return arr[h%arr.length];
  }

  // ===== ITENS DO MUNDO (postes, geradores, brocas — colocados pelo Guardião) =====
  // Registry EXTENSÍVEL: item novo = célula em ITEM_CELLS (medida na sheet) +
  // entrada em ITEM_DEFS (altura, colisão, luz, regra de ângulo). Nada mais.
  const ITEM_CELLS={
    lamp_wall:[110,70,129,322], lamp_diag:[403,70,112,322],
    lamp_front:[741,70,88,321], lamp_side:[1006,84,143,306],
    gen_a:[56,463,228,159], gen_b:[651,443,232,180],
    drill_a:[105,677,97,324], drill_b:[720,675,77,318]
  };
  const ITEM_DEFS={
    lamp:    { hFrac:0.85, colR:8,  kind:'lamp3', light:{cRange:260,cPow:1.25,dRange:110,dPow:0.42}, headFrac:0.10 },
    walllamp:{ hFrac:0.78, colR:6,  kind:'wall1', light:{cRange:230,cPow:1.10,dRange:95,dPow:0.36}, headFrac:0.14 },
    gen:     { hFrac:0.40, colR:14, kind:'two', cells:['gen_a','gen_b'] },
    drill:   { hFrac:1.30, colR:14, kind:'two', cells:['drill_a','drill_b'] }
  };
  const ITEM_SPR={dirty:{},clean:{}}, ITEM_SPR_F={dirty:{},clean:{}};
  ['dirty','clean'].forEach(st=>{
    const im=new Image();
    im.onload=()=>{
      for(const [nm,[sx,sy,sw,sh]] of Object.entries(ITEM_CELLS)){
        const c=document.createElement('canvas'); c.width=sw; c.height=sh;
        c.getContext('2d').drawImage(im,sx,sy,sw,sh,0,0,sw,sh);
        ITEM_SPR[st][nm]=c;
        const f=document.createElement('canvas'); f.width=sw; f.height=sh;
        const fc=f.getContext('2d'); fc.translate(sw,0); fc.scale(-1,1); fc.drawImage(c,0,0);
        ITEM_SPR_F[st][nm]=f;
      }
    };
    im.src='img/items_'+st+'.png';
  });
  let worldItems={}, worldItemsArr=[];
  function itemBlocked(px,pd){
    for(let i=0;i<worldItemsArr.length;i++){
      const it=worldItemsArr[i], def=ITEM_DEFS[it.type];
      if(!def) continue;
      const R=def.colR+9, dx=px-it.x, dd=pd-it.depth;
      if(dx*dx+dd*dd<R*R) return true;
    }
    return false;
  }
  // Doom rotation dos itens: sem sprite de costas (canon: jogadores não veem por trás)
  function itemCellFor(it,def){
    const viewAngle=Math.atan2(nav.x-it.x, nav.depth-it.depth)*180/Math.PI;
    const rel=(((viewAngle-(it.rot||0))%360)+360)%360;
    if(def.kind==='wall1') return {nm:'lamp_wall',flip:rel>180};
    if(def.kind==='two'){
      const oct=Math.round(rel/90)%4;
      return {nm:def.cells[oct%2],flip:oct===3};
    }
    const oct=Math.round(rel/45)%8;
    const nm=['lamp_front','lamp_diag','lamp_side','lamp_diag','lamp_front','lamp_diag','lamp_side','lamp_diag'][oct];
    return {nm,flip:oct>=1&&oct<=3}; // o sprite diagonal aponta pro lado OPOSTO do assumido
  }
  function drawItemSprites(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_){
    if(!worldItemsArr.length||!ITEM_SPR.dirty.lamp_front) return;
    const hdg=nav.heading*Math.PI/180;
    const dirX=Math.sin(hdg), dirY=Math.cos(hdg);
    const invDet=1.0/Math.tan(Math.PI*78/360);
    const list=[];
    for(const it of worldItemsArr){
      const {tX,tY}=billboardTransform(it.x,it.depth,hdg,invDet,dirX,dirY);
      if(tY>0.5&&tY<VIS_WALL_*1.1) list.push({it,tX,tY});
    }
    list.sort((a,b)=>b.tY-a.tY);
    const depthN2=Math.max(0,Math.min(1,(nav.depth-START_DEPTH)/(MAX_DEPTH-START_DEPTH)));
    const amb=Math.max(0.06,1-depthN2*0.8);
    // canvas temp reutilizado: no escuro o item ESCURECE, não fica translúcido
    if(!drawItemSprites._tc) drawItemSprites._tc=document.createElement('canvas');
    const tc=drawItemSprites._tc, tcx=tc.getContext('2d');
    for(const {it,tX,tY} of list){
      const def=ITEM_DEFS[it.type]; if(!def) continue;
      const st=it.clean?'clean':'dirty';
      const {nm,flip}=itemCellFor(it,def);
      const spr=(flip?ITEM_SPR_F:ITEM_SPR)[st][nm]; if(!spr) continue;
      const screenX=w/2*(1+tX/tY);
      const wallPx=WALLH_/tY;
      const projH=wallPx*def.hFrac;
      const projW=projH*(spr.width/spr.height);
      if(screenX+projW/2<0||screenX-projW/2>w) continue;
      const yBase=h/2+wallPx/2;            // assenta na base da parede (chão)
      const yTop=yBase-projH;
      const lit=lightOn?Math.max(0,1-Math.hypot(screenX-beamX*w,(yTop+projH*0.5)-beamY*h)/(Math.min(w,h)*0.62)):0;
      const selfL=def.light?(it.clean?0.88:0.52):0; // lâmpada acesa se auto-ilumina
      const dk=Math.max(0.10,Math.min(1,Math.max(selfL,amb*0.9+lit*0.8)));
      let sprd=spr;
      if(dk<0.985){
        if(tc.width!==spr.width||tc.height!==spr.height){ tc.width=spr.width; tc.height=spr.height; }
        else tcx.clearRect(0,0,tc.width,tc.height);
        tcx.globalCompositeOperation='source-over';
        tcx.drawImage(spr,0,0);
        tcx.globalCompositeOperation='source-atop';
        tcx.fillStyle='rgba(0,0,0,'+(1-dk).toFixed(3)+')';
        tcx.fillRect(0,0,tc.width,tc.height);
        sprd=tc;
      }
      billboardDraw(w,h,zBuf,COLS_,colW_,WALLH_,VIS_WALL_,screenX,tY,projH,projW,sprd,1,yTop);
      // luz do painel: CORE que fura a névoa de longe + CORONA em degradê largo
      if(def.light){
        const col=Math.max(0,Math.min(COLS_-1,Math.floor(screenX/colW_)));
        if(tY<zBuf[col]+10){
          const hy=yTop+projH*def.headFrac;
          const flick=it.clean?1:(0.72+0.28*Math.sin(t*0.21+(it.x||0)));
          // CORE: farol na escuridão — visível bem além do alcance das paredes
          const farFade=Math.max(0,1-tY/(VIS_WALL_*2.3));
          const coreA=(it.clean?0.85:0.30)*flick*Math.pow(farFade,1.35);
          if(coreA>0.02){
            const coreR=Math.max(2.5,projH*0.10);
            const cCol=it.clean?'235,245,255':'240,205,130';
            const gc=x.createRadialGradient(screenX,hy,0,screenX,hy,coreR*3);
            gc.addColorStop(0,`rgba(${cCol},${coreA.toFixed(3)})`);
            gc.addColorStop(0.35,`rgba(${cCol},${(coreA*0.35).toFixed(3)})`);
            gc.addColorStop(1,'transparent');
            x.save(); x.globalCompositeOperation='screen'; x.fillStyle=gc;
            x.beginPath(); x.arc(screenX,hy,coreR*3,0,6.28); x.fill(); x.restore();
          }
          // CORONA: luz espalhada na água banha a região em volta em degradê
          const fogC=Math.max(0,Math.min(1,1-tY/(VIS_WALL_*1.05)));
          const corA=(it.clean?0.34:0.10)*flick*fogC;
          if(corA>0.015){
            const corR=Math.max(14,projH*(it.clean?1.9:1.0));
            const wCol=it.clean?'150,200,245':'190,150,70';
            const g2=x.createRadialGradient(screenX,hy,0,screenX,hy,corR);
            g2.addColorStop(0,`rgba(${wCol},${corA.toFixed(3)})`);
            g2.addColorStop(0.4,`rgba(${wCol},${(corA*0.45).toFixed(3)})`);
            g2.addColorStop(1,'transparent');
            x.save(); x.globalCompositeOperation='screen'; x.fillStyle=g2;
            x.beginPath(); x.arc(screenX,hy,corR,0,6.28); x.fill(); x.restore();
          }
        }
      }
    }
  }

  let grabStartT=0;
  // flinch do STRUGGLE: surtos de luta sacodem a criatura agarrada na tela
  let grabFlinchX=0,grabFlinchY=0,grabFlinchVX=0,grabFlinchVY=0,nextFlinchT=0;
  // canvas offscreen do chão: putImageData ignora o transform de DPR do contexto
  // principal — renderiza aqui e blita com drawImage (que respeita o transform)
  let floorCnv=null, floorCtx=null, floorImgC=null;
  // proximidade da superfície mirada (0=longe, 1=perto), suavizada — controla o feixe
  let aimNearSm=0;

  // paleta de cor por profundidade: azul-teal raso → azul oceânico → verde-preto abissal (Subnautica)
  function depthRGB(dn){
    const s=[[0.00,13,35,45],[0.10,8,25,37],[0.28,5,15,25],[0.55,2,9,15],[0.80,2,6,9],[1.00,1,5,4]];
    let i=0; while(i<s.length-1&&s[i+1][0]<=dn)i++;
    if(i>=s.length-1)return[s[i][1],s[i][2],s[i][3]];
    const f=(dn-s[i][0])/(s[i+1][0]-s[i][0]);
    return[s[i][1]+(s[i+1][1]-s[i][1])*f, s[i][2]+(s[i+1][2]-s[i][2])*f, s[i][3]+(s[i+1][3]-s[i][3])*f];
  }

  // overlay screen-space quando criatura agarrou o sub: a CARA gruda no visor.
  // O frame da spritesheet tem muito padding transparente — mede o bbox real
  // por alpha uma vez (união da row 4) e escala a criatura pra ESTOURAR o visor.
  let _grabTrim=null;
  function computeGrabTrim(){
    const f0=dfFrames[Math.min(dfFrames.length-1,4*DF_COLS)];
    const c=document.createElement('canvas');
    c.width=f0.width; c.height=f0.height;
    const cc=c.getContext('2d',{willReadFrequently:true});
    let x0=f0.width,y0=f0.height,x1=0,y1=0;
    for(let col=0;col<DF_COLS;col++){
      const fr=dfFrames[Math.min(dfFrames.length-1,4*DF_COLS+col)];
      cc.clearRect(0,0,c.width,c.height);
      cc.drawImage(fr,0,0);
      const d=cc.getImageData(0,0,c.width,c.height).data;
      for(let y=0;y<c.height;y++)for(let xx=0;xx<c.width;xx++){
        if(d[(y*c.width+xx)*4+3]>25){
          if(xx<x0)x0=xx; if(xx>x1)x1=xx;
          if(y<y0)y0=y; if(y>y1)y1=y;
        }
      }
    }
    _grabTrim=x1>x0?{x:x0,y:y0,w:x1-x0,h:y1-y0}:{x:0,y:0,w:f0.width,h:f0.height};
  }
  function drawGrabOverlay(w,h){
    if(!grabbedBy||!dfFrames.length) return;
    if(!_grabTrim) computeGrabTrim();
    const elapsed=(performance.now()-grabStartT)/1000;
    const appear=Math.min(1,elapsed*2.2);
    if(appear<0.02) return;
    // agarrada, ela NÃO nada: alterna só entre a pose 100% frontal (col 0)
    // e a vizinha (col 1), com crossfade lento — segurando, não circulando
    const gph=(t*0.026)%2;
    const blend=gph<1?gph:2-gph; // 0→1→0 (ping-pong suave)
    const frameA=dfFrames[Math.min(dfFrames.length-1,4*DF_COLS)];
    const frameB=dfFrames[Math.min(dfFrames.length-1,4*DF_COLS+1)];
    const breathe=1+0.045*Math.sin(t*0.06);
    // a LUTA dos players chacoalha a criatura na tela (struggleAmt 0-100)
    const stg=1+struggleAmt*0.012;
    const shX=(Math.sin(t*0.31+1.7)*4+Math.cos(t*0.73+0.3)*2.5)*stg;
    const shY=(Math.cos(t*0.26+0.9)*3+Math.sin(t*0.57)*1.8)*stg;
    // FLINCH: surtos de luta DESLOCAM a criatura com um safanão — ela escorrega
    // alguns pixels, encolhe um tico (perdeu aderência) e reagarra com a mola
    const nowMs=performance.now();
    if(struggleAmt>3&&nowMs>=nextFlinchT){
      nextFlinchT=nowMs+Math.max(350,950-struggleAmt*5);
      grabFlinchVX+=(Math.random()<0.5?-1:1)*(45+struggleAmt*1.3);
      grabFlinchVY+=(Math.random()-0.5)*(30+struggleAmt*0.8);
    }
    const fdt=0.016, FK=110, FD=8;
    grabFlinchVX+=(-grabFlinchX*FK-grabFlinchVX*FD)*fdt; grabFlinchX+=grabFlinchVX*fdt;
    grabFlinchVY+=(-grabFlinchY*FK-grabFlinchVY*FD)*fdt; grabFlinchY+=grabFlinchVY*fdt;
    const slipK=1-Math.min(0.07,Math.abs(grabFlinchX)*0.0018);
    // bbox real escalada pra estourar as bordas; entra crescendo (vem pro vidro)
    const gw=w*2.10*breathe*slipK*(0.62+0.38*appear);
    const gh2=gw*(_grabTrim.h/_grabTrim.w);
    const cx2=w/2+shX+grabFlinchX, cy2=h*0.54+shY+grabFlinchY;
    const baseAl=Math.min(1,appear*1.15)*0.97;
    x.save();
    x.globalAlpha=baseAl*(1-blend);
    x.drawImage(frameA,_grabTrim.x,_grabTrim.y,_grabTrim.w,_grabTrim.h,
      cx2-gw/2, cy2-gh2/2, gw, gh2);
    if(blend>0.02){
      x.globalAlpha=baseAl*blend;
      x.drawImage(frameB,_grabTrim.x,_grabTrim.y,_grabTrim.w,_grabTrim.h,
        cx2-gw/2, cy2-gh2/2, gw, gh2);
    }
    x.restore();
  }

  // faróis DUPLOS indo PRA FRENTE: cada feixe é um cone que CONVERGE no ponto de
  // mira (perspectiva — afunila e morre na distância, não abre na tela), com
  // gradiente ao longo do eixo e um DISCO elíptico onde a luz atinge a superfície.
  function drawFlashlight(w,h,isOld_,beamAl_){
    if(!lightOn) return;
    const tx=beamX*w, ty=beamY*h;
    const br=isOld_?235:132, bgc=isOld_?202:218, bb=isOld_?122:240;
    const near=aimNearSm; // 1 = mirando superfície perto; 0 = mirando o breu
    x.save(); x.globalCompositeOperation='screen';
    // DOIS faróis bem separados nos cantos do casco
    const orgs=[[w*0.02,h*1.16,1.0],[w*0.98,h*1.16,1.0]];
    const N=5;
    // perto: feixe GROSSO e definido; longe: fino e difuso
    const baseW=w*(0.10+0.09*near), tipW=w*(0.006+0.095*near);
    const alphaK=(0.60+0.85*near)*beamAl_;
    const fadeEnd=0.26+0.50*near; // perto: o brilho segue firme até quase o alvo
    for(const [ox,oy,mult] of orgs){
      const dxb=tx-ox, dyb=ty-oy;
      const L=Math.hypot(dxb,dyb)||1;
      const nx=-dyb/L, ny=dxb/L; // perpendicular ao eixo do feixe
      for(let k=0;k<N;k++){
        const f=k/(N-1);
        const bwid=baseW*(1-f*0.72), twid=tipW*(1-f*0.5);
        const al=(0.020+f*f*0.055)*alphaK*mult;
        const g=x.createLinearGradient(ox,oy,tx,ty);
        g.addColorStop(0,`rgba(${br},${bgc},${bb},${(al*0.55).toFixed(3)})`);
        g.addColorStop(fadeEnd,`rgba(${br},${bgc},${bb},${al.toFixed(3)})`);
        g.addColorStop(1,'rgba(0,0,0,0)');
        x.fillStyle=g;
        x.beginPath();
        x.moveTo(ox+nx*bwid, oy+ny*bwid);
        x.lineTo(tx+nx*twid, ty+ny*twid);
        x.lineTo(tx-nx*twid, ty-ny*twid);
        x.lineTo(ox-nx*bwid, oy-ny*bwid);
        x.closePath(); x.fill();
      }
    }
    // disco do facho: perto = menor, mais forte e nítido; longe = maior, fraco e difuso
    const hot=(0.08+0.20*near)*beamAl_;
    const rx_=w*(0.085+0.19*(1-near));
    const coreStop=0.22+0.42*near;
    const gh=x.createRadialGradient(tx,ty,0,tx,ty,rx_);
    gh.addColorStop(0,`rgba(${br},${bgc},${bb},${hot.toFixed(3)})`);
    gh.addColorStop(coreStop,`rgba(${br},${bgc},${bb},${(hot*0.55).toFixed(3)})`);
    gh.addColorStop(1,'rgba(0,0,0,0)');
    x.save(); x.translate(tx,ty); x.scale(1,0.62); x.translate(-tx,-ty);
    x.fillStyle=gh; x.beginPath(); x.arc(tx,ty,rx_,0,6.28); x.fill(); x.restore();
    x.restore();
  }

  let t=0;
  function draw(){
    t+=1;
    const w=VPW,h=VPH;
    if(w<2){requestAnimationFrame(draw);return;}
    x.clearRect(0,0,w,h);
    const st=STATE.state||"void";              // estado de ameaça (DM)
    const depth=nav.depth, mode=nav.mode;      // pilotagem
    const isOld=(STATE.skin||"old").startsWith("old");   // skin do casco (escopo do draw inteiro)

    // ===== ILUMINAÇÃO AMBIENTE: decai com a profundidade. clara a 200m, escurece ao fundo.
    const depthN = Math.max(0, Math.min(1, (depth-START_DEPTH)/(MAX_DEPTH-START_DEPTH)));
    const ambLight = 1 - depthN*0.8;            // 1 (200m) -> 0.2 (fundo)
    // colisão: flicker da luz — oscilação não mecânica com dois senos
    const flickerMod = collisionFlicker * (0.5 + 0.28*Math.sin(t*0.38) + 0.12*Math.sin(t*0.91));
    const effectiveAmb = ambLight * (1 - Math.max(0,flickerMod));
    const beyond = depth>CORAL_DEPTH;
    // COR DA ÁGUA nesta profundidade: alvo ÚNICO de fog — fundo, paredes e chão
    // dissolvem TODOS nesta mesma cor. Nada some em preto na frente de água clara.
    const [cr,cg_,cb_]=depthRGB(depthN);
    const ambSc=0.16+effectiveAmb*0.84;
    const waterR=cr*ambSc, waterG=cg_*ambSc, waterB=cb_*ambSc;
    // fundo = a própria água: levemente mais clara acima (luz desce da superfície/plataforma)
    const bgGrad=x.createLinearGradient(0,0,0,h);
    bgGrad.addColorStop(0,`rgb(${waterR*1.30|0},${waterG*1.30|0},${waterB*1.30|0})`);
    bgGrad.addColorStop(0.45,`rgb(${waterR|0},${waterG|0},${waterB|0})`);
    bgGrad.addColorStop(1,`rgb(${waterR|0},${waterG|0},${waterB|0})`);
    x.fillStyle=bgGrad; x.fillRect(0,0,w,h);

    // ===== RAYCASTER: corredor coerente (paredes = margens do canyon) =====
    // o sub está em (nav.x, nav.depth) olhando p/ heading. as duas margens do corredor
    // são paredes. p/ cada coluna do visor lanço um raio, acho onde cruza a margem,
    // calculo a distância perpendicular (corrige fish-eye) e desenho uma tira vertical
    // de altura ∝ 1/dist com textura de rocha. perto = alta; longe = baixa.
    if(mode==="diving" || mode==="reeling"){
      const FOV=Math.PI*78/180;            // campo de visão (rad)
      const hdg=nav.heading*Math.PI/180;   // 0 = descer (+depth)
      const COLS=Math.max(60, Math.floor(w/4)); // colunas do raycaster (resolução)
      const colW=w/COLS;
      const MAXD=520;                      // alcance do raio (unidades de mundo)
      const STEP=5;                        // passo de marcha do raio
      const WALLH=h*46;                    // fator de altura da parede projetada
      const horizon=h/2;

      // ---- CHÃO (sempre) e TETO (só na caverna) via FLOOR CASTING (gira com o heading) ----
      // técnica lodev: pra cada linha y abaixo do horizonte, a distância é posZ/(y-horizon),
      // e o ponto no mundo = pos + dist*rayDir, com rayDir interpolando entre os vetores
      // (dir - plane) e (dir + plane), que GIRAM com o heading. textura por ruído no mundo.
      const inCave = depth>CORAL_DEPTH;
      // vetores de câmera (giram com o heading): dir = pra onde olha, plane = perpendicular (FOV)
      const dirX=Math.sin(hdg), dirY=Math.cos(hdg);            // direção (no plano x,profundidade)
      const planeMag=Math.tan(FOV/2);
      const planeX=Math.cos(hdg)*planeMag, planeY=-Math.sin(hdg)*planeMag;  // plano de câmera
      const posX=nav.x, posY=depth;                            // posição no mundo
      const hh=h*0.5;
      // alcance de visão em wu: paredes E chão dissolvem na cor da água nesta distância
      const VIS_WALL = Math.max(180, 320 - depthN*140);
      const WALL_SIGHT = VIS_WALL*0.9;
      // lâmpadas colocadas pelo GM iluminam o mundo DE VERDADE: coleta as ativas
      const liveL=[];
      for(const it of worldItemsArr){
        const defL=ITEM_DEFS[it.type];
        if(!defL||!defL.light) continue;
        const rng=it.clean?defL.light.cRange:defL.light.dRange;
        const pw=it.clean?defL.light.cPow:defL.light.dPow;
        const ddx=it.x-nav.x, ddd=it.depth-nav.depth;
        if(ddx*ddx+ddd*ddd<(VIS_WALL+rng)*(VIS_WALL+rng)) liveL.push({wx:it.x,wd:it.depth,rng,pw});
      }
      const nLL=liveL.length;

      // ---- CHÃO via floor casting (lodev), SEM teto (canon: o teto foi descartado) ----
      // rowDist = posZ/p em WORLD UNITS (posZ = WALLH/2): o chão encontra a base das
      // paredes exatamente, e dissolve na cor da água na MESMA distância (WALL_SIGHT).
      const posZ=WALLH*0.5;
      const hI=Math.floor(h), wI=Math.max(2,Math.floor(w));
      const floorStart=Math.max(Math.floor(hh)+1, Math.ceil(hh+posZ/WALL_SIGHT));
      const floorH=hI-floorStart;
      if(floorH>0){
        // offscreen SEM transform: putImageData ignora o DPR do contexto principal.
        // buffer alocado no tamanho máximo (h/2) — sem realloc quando floorH varia.
        const maxFH=Math.ceil(hI*0.5)+2;
        if(!floorCnv||floorCnv.width!==wI||floorCnv.height<maxFH){
          floorCnv=document.createElement('canvas');
          floorCnv.width=wI; floorCnv.height=maxFH;
          floorCtx=floorCnv.getContext('2d');
          floorImgC=floorCtx.createImageData(wI,maxFH);
        }
        const fBuf=new Uint32Array(floorImgC.data.buffer);
        // pre-fill opaco com a cor da água: linhas distantes = água, sem emenda com o fundo
        const pkR=waterR|0, pkG=waterG|0, pkB=waterB|0;
        fBuf.fill((255<<24)|(pkB<<16)|(pkG<<8)|pkR,0,floorH*wI);
        const spotR_=Math.min(wI,hI)*0.55;
        const bxw=beamX*wI, byh=beamY*h;
        const lvBase=0.34+effectiveAmb*0.72;
        // tint marrom-ACINZENTADO como as paredes, um tom mais claro
        const fTr=isOld?1.02:0.92, fTg=isOld?0.95:0.89, fTb=isOld?0.82:0.80;
        for(let y=floorStart;y<hI;y++){
          const p=y-hh;
          const rowDist=posZ/p;
          const fogF=Math.max(0,Math.min(1,1-rowDist/WALL_SIGHT));
          if(fogF<=0.004) continue;
          const fogFK=fogF*Math.sqrt(fogF), wMixF=1-fogFK;
          const fsx=rowDist*(dirX-planeX)+posX, fsy=rowDist*(dirY-planeY)+posY;
          const fex=rowDist*(dirX+planeX)+posX, fey=rowDist*(dirY+planeY)+posY;
          const fstx=(fex-fsx)/wI, fsty=(fey-fsy)/wI;
          let flX=fsx, flY=fsy;
          const fi0=(y-floorStart)*wI;
          const fArr=TEXR.floor, fN=fArr.length;
          for(let sx=0;sx<wI;sx++){
            // amostra da TEXTURA do chão por coords de mundo (1.6 texel/wu → tile=16m);
            // variante determinística por bloco de textura (dá vida sem flicker)
            const txx=(flX*1.6)|0, tyy=(flY*1.6)|0;
            let fpx;
            if(fN===1) fpx=fArr[0].px;
            else{
              let hv=((txx>>8)*73856093)^((tyy>>8)*19349663);
              hv=(hv^(hv>>>13))>>>0;
              fpx=fArr[hv%fN].px;
            }
            const tc=fpx[((tyy&TEX_MASK)<<TEX_SHIFT)|(txx&TEX_MASK)];
            const spotI=lightOn?Math.max(0,1-Math.hypot(sx-bxw,y-byh)/spotR_):0;
            let addL=0;
            for(let li=0;li<nLL;li++){
              const L=liveL[li], lxd=flX-L.wx, lyd=flY-L.wd;
              const d2=lxd*lxd+lyd*lyd;
              if(d2<L.rng*L.rng){ const q=1-Math.sqrt(d2)/L.rng; addL+=L.pw*q*q; }
            }
            const kt=(lvBase+spotI*0.95*fogF+addL)*fogFK;
            const r=Math.min(255,(tc&255)*kt*fTr+waterR*wMixF)|0;
            const g=Math.min(255,((tc>>>8)&255)*kt*fTg+waterG*wMixF)|0;
            const b=Math.min(255,((tc>>>16)&255)*kt*fTb+waterB*wMixF)|0;
            fBuf[fi0+sx]=(255<<24)|(b<<16)|(g<<8)|r;
            flX+=fstx; flY+=fsty;
          }
        }
        floorCtx.putImageData(floorImgC,0,0,0,0,wI,floorH);
        // drawImage respeita o transform de DPR — o chão cai exatamente onde deve
        x.drawImage(floorCnv,0,0,wI,floorH,0,floorStart,wI,floorH);
      }

      // ---- PAREDES (raycasting) ----
      // zbuffer: distância perpendicular de cada coluna (para sprite depth test)
      const zBuffer = new Float32Array(COLS).fill(MAXD);
      for(let i=0;i<COLS;i++){
        const a = hdg + (i/(COLS-1) - 0.5)*FOV;
        const camAng = (i/(COLS-1)-0.5)*FOV;
        const dx=Math.sin(a), dd=Math.cos(a);
        let rx=nav.x, rd=nav.depth, dist=0, hitSide=0, hitKind="wall", hitPillar=null;
        for(let s=STEP;s<=MAXD;s+=STEP){
          rx=nav.x+dx*s; rd=nav.depth+dd*s;
          if(rd>=MAX_DEPTH){ dist=s; hitSide=0; hitKind="floor_end"; break; }
          if(isStationBackWall(rd)){ dist=s; hitSide=0; hitKind="station_wall"; break; }
          const hp=pillarAt(rx,rd);
          if(hp){ dist=s; hitSide=0; hitKind="pillar"; hitPillar=hp; break; }
          const tv=tileValueAt(rx,rd);
          if(tv){ dist=s; hitSide=dx<0?-1:1; hitKind=tv===2?"cave":"wall"; break; }
          if(s>=VIS_WALL){ dist=s; hitSide=0; hitKind="dark"; break; }
        }
        if(!dist) continue;
        // refina o hit por BISSECÇÃO: o march de 5wu penetra até 5wu na parede com
        // erro aleatório por coluna — o texU herdava esse ruído (rasgado visível nas
        // faces vistas de frente). 5 iterações → erro ~0.16wu; a distância precisa
        // também estabiliza a altura projetada (paredes não "respiram" ao girar).
        if(hitKind!=="dark"&&dist>STEP){
          let lo=dist-STEP, hi=dist;
          for(let bi=0;bi<5;bi++){
            const mid=(lo+hi)*0.5;
            const mx=nav.x+dx*mid, md=nav.depth+dd*mid;
            const solid=hitKind==="pillar"?!!pillarAt(mx,md)
              :hitKind==="station_wall"?isStationBackWall(md)
              :hitKind==="floor_end"?md>=MAX_DEPTH
              :tileValueAt(mx,md)!==0;
            if(solid) hi=mid; else lo=mid;
          }
          dist=hi; rx=nav.x+dx*hi; rd=nav.depth+dd*hi;
        }
        const perp=Math.max(8, dist*Math.cos(camAng));
        // a parede de ESCURIDÃO não é sólida: não deve ocluir o core das lâmpadas
        // (sprites/biolum já se cortam sozinhos pelo próprio fog antes dela)
        zBuffer[i]=hitKind==="dark"?MAXD:perp;
        // além do alcance: a rocha já dissolveu 100% na água — não desenha NADA
        // (o fundo é a cor da água; a "escuridão" acontece por igualdade de cor)
        if(hitKind==="dark") continue;
        const colX=(i+0.5)*colW;
        const sh2=Math.min(h*1.4, WALLH/perp);
        const y0=h/2 - sh2/2, y1=h/2 + sh2/2;
        const fog=Math.max(0, Math.min(1, 1 - dist/WALL_SIGHT));
        const fogK=fog*Math.sqrt(fog);
        // facho nas paredes: ângulo do raio vs ângulo do cursor (camera space), atenua longe
        const beamAngH=(beamX-0.5)*FOV;
        const angDiffH=Math.abs(camAng-beamAngH);
        const litH=lightOn?Math.max(0,Math.min(1,(Math.PI/5-angDiffH)/(Math.PI/5-Math.PI/14))):0;
        const litV=lightOn?Math.max(0,1-Math.abs(beamY-0.5)*2.5):0;
        const lit=litH*litV*fog;
        let addW=0;
        for(let li=0;li<nLL;li++){
          const L=liveL[li], lxd=rx-L.wx, lyd=rd-L.wd;
          const d2=lxd*lxd+lyd*lyd;
          if(d2<L.rng*L.rng){ const q=1-Math.sqrt(d2)/L.rng; addW+=L.pw*q*q; }
        }
        const sideShade=hitSide<0?0.84:1.0;
        // ---- TIRA DE TEXTURA ----
        // U = (rx+rd): coordenada DIAGONAL do mundo — nunca constante em nenhuma face.
        // Pilar: U = offset lateral DENTRO do pilar (preserva o shading cilíndrico da
        // textura) e variante fixa por pilar. Cave/wall: variante por bloco de 4×4
        // tiles (troca a cada 16m — o fog esconde a emenda).
        let texObj, texU;
        if(hitKind==="pillar"&&hitPillar){
          texObj=texVar(TEXR.pillar,hitPillar.x|0,hitPillar.top|0);
          // A face é decidida pela GEOMETRIA do ponto de hit (estável por coluna),
          // NUNCA pelo ângulo do raio — com FOV de 78°, colunas vizinhas da tela
          // classificariam a mesma face de formas diferentes (mapeamento misturado).
          const dSide=hitPillar.r-Math.abs(rx-hitPillar.x);      // fundura na face leste/oeste
          const dCap=Math.min(rd-hitPillar.top,hitPillar.bot-rd); // fundura na face norte/sul
          if(dSide<=dCap){
            // face LESTE/OESTE: U desliza pela profundidade na MESMA densidade das
            // paredes (1.7 texel/wu) — colunas vizinhas ficam contíguas na textura
            texU=(((rd*1.7)|0)%TEX_SIZE+TEX_SIZE)%TEX_SIZE;
          } else {
            // face NORTE/SUL: offset lateral — o shading cilíndrico lê como cilindro
            texU=Math.max(0,Math.min(TEX_SIZE-1,((rx-(hitPillar.x-hitPillar.r))/(2*hitPillar.r))*TEX_SIZE))|0;
          }
        } else {
          const arr=hitKind==="cave"?TEXR.cave:TEXR.wall;
          texObj=texVar(arr,Math.floor(rd/(TILE*4)),Math.floor((rx-X_MIN_W)/(TILE*4)));
          texU=(((((rx+rd)*1.7)|0)%TEX_SIZE)+TEX_SIZE)%TEX_SIZE;
        }
        const xL=colX-colW/2-0.5, wW=colW+1, hS=y1-y0;
        x.imageSmoothingEnabled=false; // nearest: nitidez PS2 nas tiras
        x.drawImage(texObj.cnv, texU, 0, 1, TEX_SIZE, xL, y0, wW, hS);
        x.imageSmoothingEnabled=true;
        // escurecimento ambiente: rocha no breu é escura; o facho recupera a cor.
        // pilar recebe luz base maior — concreto claro se destaca da rocha
        const ambBase=hitKind==="pillar"?(0.46+ambLight*0.58):(0.24+ambLight*0.60);
        const ambF=Math.max(0,Math.min(1,ambBase*sideShade+lit*0.72+addW*1.05));
        if(ambF<0.995){ x.fillStyle=`rgba(0,0,0,${(1-ambF).toFixed(3)})`; x.fillRect(xL,y0,wW,hS); }
        // fog: dissolve na cor da água pela DISTÂNCIA (única fonte de fade)
        const pres=fogK;
        if(pres<0.995){ x.fillStyle=`rgba(${waterR|0},${waterG|0},${waterB|0},${(1-pres).toFixed(3)})`; x.fillRect(xL,y0,wW,hS); }
        // brilho do facho por cima (luz espalhada na água em frente à rocha)
        if(lit>0.05){
          x.save(); x.globalCompositeOperation='screen';
          x.fillStyle=isOld?`rgba(185,148,82,${(lit*0.28).toFixed(3)})`:`rgba(105,175,200,${(lit*0.30).toFixed(3)})`;
          x.fillRect(xL,y0,wW,hS); x.restore();
        }
        // sombra sutil nas arestas topo/base — some junto com a rocha
        if(pres>0.12){
          x.fillStyle=`rgba(0,0,0,${(0.22*pres).toFixed(2)})`;
          x.fillRect(xL, y0, wW, Math.max(1,sh2*0.05));
          x.fillRect(xL, y1-Math.max(1,sh2*0.05), wW, Math.max(1,sh2*0.05));
        }
      }
      // distância da superfície mirada: o feixe engrossa perto, afina e borra longe.
      // normalização por 55% do alcance + sqrt: range dinâmico visível em uso normal
      {
        const iAim=Math.max(0,Math.min(COLS-1,Math.round(beamX*(COLS-1))));
        let dAim=zBuffer[iAim];
        if(beamY*h>hh+1){ const pAim=beamY*h-hh; dAim=Math.min(dAim,posZ/pAim); }
        const tgt=Math.sqrt(Math.max(0,Math.min(1,1-dAim/(WALL_SIGHT*0.55))));
        aimNearSm+=(tgt-aimNearSm)*0.15;
      }
      // sprites billboard no mundo (depth test pelo zbuffer) — itens são cenário, vão antes
      if(mode==="diving"||mode==="reeling"){
        drawItemSprites(w,h,zBuffer,COLS,colW,WALLH,VIS_WALL);
        drawFishSprites(w,h,zBuffer,COLS,colW,WALLH,VIS_WALL);
        drawCreatureSprites(w,h,zBuffer,COLS,colW,WALLH,VIS_WALL);
      }
      // BIOLUMINESCÊNCIA AMBIENTE: pontos de luz vivos abaixo do coral (organismos do canyon)
      if(beyond){
        const invDetB=1.0/Math.tan(Math.PI*78/360);
        for(const bp of BIOLUM_PTS){
          const {tX,tY}=billboardTransform(bp.wx,bp.wd,hdg,invDetB,dirX,dirY);
          if(tY<=0.3||tY>VIS_WALL*1.15) continue;
          const sx=w/2*(1+tX/tY);
          if(sx<-w*0.15||sx>w*1.15) continue;
          // depth-test: não brilha através de rocha
